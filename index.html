  <div class="splash-brand">SEVEN</div>
  <div class="splash-loader"></div>
</div>

<!-- APP SHELL -->
<div id="app"></div>

<script>
document.addEventListener('DOMContentLoaded',()=>{
  if(window._autoLoginDone)return;
  const s=getSession();
  if(s&&s.uid){
    let initPage='home.html';
    const p=window.location.pathname.split('/').pop();
    if(p&&p!=='index.html'&&p!==''&&_spaPages.includes(p))initPage=p+window.location.search;
    goTo(initPage);
  }else if(localStorage.getItem('uid')){goTo('login.html')}
  else{goTo('registration.html')}
  document.getElementById('splash').classList.add('hidden');
  setTimeout(()=>{const sp=document.getElementById('splash');if(sp)sp.remove()},500);
});
</script>
