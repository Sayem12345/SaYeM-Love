<title>SEVEN - Active</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="css/style.css">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
</head>
<body class="bg-[#0B1220] text-white d-flex flex-column" style="font-family:'Inter',sans-serif">
<div class="topbar">
  <button class="topbar-btn" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i></button>
  <div class="topbar-center"><div class="topbar-title">Active Now</div></div>
  <div style="width:38px"></div>
</div>
<div id="activeUsers" class="flex-grow-1 overflow-y-auto px-2"></div>
<div id="activeEmpty" class="empty">
  <div class="empty-icon"><i class="fa-solid fa-circle" style="color:#10B981"></i></div>
  <div class="empty-title">No one online</div>
  <div class="empty-desc">Active users will appear here</div>
</div>
<script src="js/firebase.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script src="js/chat.js"></script>
<script>
let unsubActive=null;
function initActive(){
  if(!isLoggedIn()){goTo('login.html');return}
  if(unsubActive)unsubActive();
  listenOnlineUsers(users=>{
    const c=document.getElementById('activeUsers');const e=document.getElementById('activeEmpty');
    c.innerHTML='';
    if(!users.length){c.style.display='none';e.classList.remove('d-none');return}
    c.style.display='block';e.classList.add('d-none');
    users.forEach(u=>{
      const d=document.createElement('div');d.className='user-row';
      d.innerHTML=`${u.profileImage?`<img class="avatar" src="${u.profileImage}" alt="">`:`<div class="avatar avatar-placeholder" style="font-size:18px">${u.name[0]}</div>`}<div class="user-row-info"><div class="user-row-name">${escapeHtml(u.name)}</div><div class="user-row-sub online">Online</div></div>`;
      d.onclick=async()=>{const id=await getOrCreateChat(u.id);if(id)goTo('chat.html?id='+id+'&partner='+u.id)};c.appendChild(d);
    });
  });
}
(function(){if(document.readyState!=='loading')initActive();else document.addEventListener('DOMContentLoaded',initActive)})();
</script>
</body>
</html>
