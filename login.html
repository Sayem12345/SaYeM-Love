<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#0B141A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='36' fill='%2300A884'/%3E%3Ctext x='96' y='130' font-size='130' font-weight='900' text-anchor='middle' fill='%23FFFFFF' font-family='sans-serif'%3ES%3C/text%3E%3C/svg%3E" sizes="192x192">
<title>SEVEN - Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Poppins:wght@400;500;600;700;800&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/mobile.css">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
</head>
<body>
<div class="auth-page">
  <div class="auth-brand">SEVEN</div>
  <div class="auth-sub">Welcome back</div>
  <div class="auth-card">
    <div class="auth-step active">
      <div class="auth-step-title">Login</div>
      <div style="text-align:center;margin-bottom:16px">
        <img id="loginImg" src="" class="avatar avatar-xl" style="display:none;margin:0 auto" alt="">
        <div id="loginPl" class="avatar avatar-xl avatar-placeholder" style="margin:0 auto;font-size:32px">?</div>
        <div style="font-size:14px;color:var(--text3);margin-top:8px" id="loginName">Enter your password</div>
      </div>
      <div class="input-group"><label class="input-label">Password</label><input type="password" class="input-field" id="loginPwd" placeholder="Password" autocomplete="current-password"></div>
      <button class="btn btn-primary btn-full btn-lg" id="loginBtn" onclick="handleLogin()"><span class="spinner spinner-sm" id="loginSpin" style="display:none"></span><span id="loginTxt">Login</span></button>
      <div style="text-align:center;margin-top:14px;font-size:14px;color:var(--text3)">No account? <a href="registration.html" style="font-weight:600">Register</a></div>
    </div>
  </div>
</div>
<script src="js/firebase.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script>
document.addEventListener('DOMContentLoaded',()=>{
  const uid=localStorage.getItem('uid');
  if(!uid){goTo('registration.html');return}
  REFS.users.child(uid).once('value',snap=>{
    const u=snap.val();
    if(!u)return;
    document.getElementById('loginName').textContent='Hi, '+u.name;
    if(u.profileImage){document.getElementById('loginImg').src=u.profileImage;document.getElementById('loginImg').style.display='block';document.getElementById('loginPl').style.display='none'}
    else{document.getElementById('loginPl').textContent=u.name[0]}
  });
  document.getElementById('loginPwd').addEventListener('keydown',e=>{if(e.key==='Enter')handleLogin()});
});
async function handleLogin(){
  const pwd=document.getElementById('loginPwd').value;
  if(!pwd){toast('Enter password','error');return}
  const btn=document.getElementById('loginBtn');const spin=document.getElementById('loginSpin');const txt=document.getElementById('loginTxt');
  btn.disabled=true;spin.style.display='inline-block';txt.textContent='Logging in...';
  const u=await loginUser(pwd);
  if(u){goTo('home.html')}
  else{btn.disabled=false;spin.style.display='none';txt.textContent='Login'}
}
</script>
</body>
</html>
