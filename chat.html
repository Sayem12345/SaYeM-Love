<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#0F172A">
<link rel="manifest" href="manifest.json">
<title>SEVEN - Chat</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/mobile.css">
<link rel="stylesheet" href="css/dark.css">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
</head>
<body>
<div class="topbar">
  <button class="topbar-btn" onclick="goTo('home.html')">←</button>
  <img id="chatAvatar" src="" class="topbar-btn" style="border-radius:50%;width:34px;height:34px;object-fit:cover;display:none" alt="">
  <div id="chatAvatarPl" class="avatar avatar-sm avatar-placeholder" style="width:34px;height:34px;font-size:14px;display:none">?</div>
  <div class="topbar-center">
    <div class="topbar-title" id="chatName">Loading...</div>
    <div class="topbar-sub" id="chatStatus">...</div>
  </div>
  <button class="topbar-btn" onclick="showInfo()">ℹ️</button>
</div>

<div class="reply-bar" id="replyBar">
  <div class="reply-bar-info"><div class="reply-bar-name">Replying</div><div class="reply-bar-text" id="replyText"></div></div>
  <button class="reply-bar-cancel" onclick="cancelReply()">✕</button>
</div>

<div class="msg-container" id="msgContainer">
  <div id="msgList"></div>
  <div id="typingIndicator" class="typing-dots" style="display:none"><span></span><span></span><span></span><span style="font-size:11px;color:var(--text3);margin-left:6px">typing...</span></div>
</div>

<div class="chat-input-wrap">
  <button class="chat-action-btn" onclick="toggleEmoji()">😊</button>
  <div class="chat-input-field">
    <textarea class="chat-input-text" id="chatInput" placeholder="Message..." rows="1" oninput="autoResize(this);setTyping(chatId,this.value.length>0)" onkeydown="handleKey(event)"></textarea>
    <div class="chat-input-actions"><button class="chat-action-btn" onclick="document.getElementById('imgInput').click()">📷</button></div>
  </div>
  <button class="chat-send" id="sendBtn" onclick="sendMsg()" disabled>➤</button>
</div>

<div class="emoji-picker" id="emojiPicker"><div class="emoji-grid" id="emojiGrid"></div></div>
<input type="file" id="imgInput" accept="image/*" style="display:none" onchange="handleImage(event)">

<div class="img-viewer" id="imgViewer" onclick="closeViewer()">
  <button class="img-viewer-close" onclick="event.stopPropagation();closeViewer()">✕</button>
  <img id="viewerImg" src="" alt="">
</div>

<div class="modal-overlay" id="infoModal">
  <div class="modal" style="text-align:center">
    <img id="infoImg" src="" class="avatar avatar-xl" style="display:none;margin:0 auto" alt="">
    <div id="infoPl" class="avatar avatar-xl avatar-placeholder" style="margin:0 auto;font-size:32px">?</div>
    <div class="modal-title" id="infoName" style="margin-top:10px">User</div>
    <div style="color:var(--text3);font-size:14px;margin-bottom:16px" id="infoStatus">Offline</div>
    <button class="btn btn-danger btn-full" onclick="deleteChat()">Delete Chat</button>
    <button class="btn btn-ghost btn-full" onclick="closeModal('infoModal')" style="margin-top:8px">Close</button>
  </div>
</div>

<script src="js/firebase.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script src="js/chat.js"></script>
<script>
let chatId=null,partnerId=null,partnerData=null,reply=null,msgUnsub=null;

document.addEventListener('DOMContentLoaded',()=>{
  if(!isLoggedIn()){goTo('login.html');return}
  initPresence();
  const p=new URLSearchParams(window.location.search);
  chatId=p.get('id');partnerId=p.get('partner');
  if(!chatId||!partnerId){toast('Invalid chat','error');goTo('home.html');return}
  loadPartner();
  msgUnsub=listenMessages(chatId,msgs=>{renderMsgs(msgs);markSeen(chatId)});
  listenTyping(chatId,()=>{const i=document.getElementById('typingIndicator');i.style.display='flex';setTimeout(()=>i.style.display='none',2000)});
  // Emoji grid
  const g=document.getElementById('emojiGrid');
  EMOJIS.forEach(e=>{const b=document.createElement('button');b.textContent=e;b.onclick=()=>insertEmoji(e);g.appendChild(b)});
});

async function loadPartner(){
  const u=await getUserById(partnerId);
  if(!u){document.getElementById('chatName').textContent='Unknown';return}
  partnerData=u;
  document.getElementById('chatName').textContent=u.name;
  const img=document.getElementById('chatAvatar'),pl=document.getElementById('chatAvatarPl');
  if(u.profileImage){img.src=u.profileImage;img.style.display='block';pl.style.display='none'}
  else{img.style.display='none';pl.style.display='flex';pl.textContent=u.name[0]}
  REFS.presence.child(partnerId).on('value',s=>{
    const st=document.getElementById('chatStatus');const d=s.val();
    if(d&&d.online){st.textContent='Online';st.className='topbar-sub online'}else{st.textContent='Offline';st.className='topbar-sub'}
  });
}

function renderMsgs(msgs){
  const c=document.getElementById('msgList');const my=uid();c.innerHTML='';
  msgs.forEach(m=>{
    const mine=m.senderId===my;const d=document.createElement('div');
    d.className='msg '+(mine?'sent':'rcvd');d.dataset.id=m.id;
    let html='';
    if(m.replyTo)html+=`<div style="font-size:11px;color:${mine?'rgba(255,255,255,.5)':'var(--primary)'};margin-bottom:3px;border-left:2px solid ${mine?'rgba(255,255,255,.3)':'var(--primary)'};padding-left:7px">${escapeHtml(m.replyTo.text||'')}</div>`;
    if(m.type==='image'&&m.imageUrl)html+=`<img src="${m.imageUrl}" class="msg-img" onclick="event.stopPropagation();openViewer('${m.imageUrl}')" alt="">`;
    if(m.text)html+=`<div>${escapeHtml(m.text)}</div>`;
    html+=`<div class="msg-time">${formatTime(m.timestamp)}${mine?`<span class="msg-status ${m.seen?'seen':''}">${m.seen?'✓✓':'✓'}</span>`:''}</div>`;
    d.innerHTML=html;
    // Long press
    let t;d.addEventListener('mousedown',()=>{t=setTimeout(()=>showOptions(m,d),500)});d.addEventListener('mouseup',()=>clearTimeout(t));d.addEventListener('mouseleave',()=>clearTimeout(t));d.addEventListener('touchstart',()=>{t=setTimeout(()=>showOptions(m,d),500)});d.addEventListener('touchend',()=>clearTimeout(t));
    c.appendChild(d);
  });
  document.getElementById('msgContainer').scrollTop=document.getElementById('msgContainer').scrollHeight;
}

function showOptions(msg,el){
  const menu=document.createElement('div');menu.style.cssText='position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-radius:14px 14px 0 0;z-index:200;padding:14px;box-shadow:0 -4px 24px rgba(0,0,0,.4);animation:fadeIn .2s ease;border-top:1px solid var(--glass-border)';
  const ov=document.createElement('div');ov.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;z-index:199;background:rgba(0,0,0,.3)';ov.onclick=()=>{menu.remove();ov.remove()};
  menu.innerHTML=`
    <button class="btn btn-ghost btn-full" style="justify-content:flex-start;padding:12px 16px" onclick="menuRemove();replyTo('${escapeHtml(msg.text)}','${msg.id}')">↩️ Reply</button>
    <button class="btn btn-ghost btn-full" style="justify-content:flex-start;padding:12px 16px" onclick="menuRemove();copy('${escapeHtml(msg.text)}')">📋 Copy</button>
    ${msg.senderId===uid()?`<button class="btn btn-ghost btn-full" style="justify-content:flex-start;padding:12px 16px;color:var(--danger)" onclick="menuRemove();delMsg('${msg.id}')">🗑️ Delete</button>`:''}
  `;document.body.appendChild(ov);document.body.appendChild(menu);
  window.menuRemove=()=>{menu.remove();ov.remove()};
}

function replyTo(text,id){reply={text,id};document.getElementById('replyBar').classList.add('show');document.getElementById('replyText').textContent=text;document.getElementById('chatInput').focus()}
function cancelReply(){reply=null;document.getElementById('replyBar').classList.remove('show')}
function copy(t){navigator.clipboard.writeText(t).then(()=>toast('Copied','success')).catch(()=>{})}
function delMsg(id){deleteMessage(chatId,id)}

async function sendMsg(){
  const i=document.getElementById('chatInput');const t=i.value.trim();if(!t)return;
  i.value='';autoResize(i);setTyping(chatId,false);document.getElementById('sendBtn').disabled=true;
  await sendMessage(chatId,t,'text','',reply);reply=null;document.getElementById('replyBar').classList.remove('show');document.getElementById('sendBtn').disabled=false;
}

function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg()};document.getElementById('sendBtn').disabled=!e.target.value.trim()}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,110)+'px'}
function toggleEmoji(){document.getElementById('emojiPicker').classList.toggle('active')}
function insertEmoji(e){const i=document.getElementById('chatInput');i.value+=e;i.focus();autoResize(i);document.getElementById('sendBtn').disabled=false}

async function handleImage(ev){
  const f=ev.target.files[0];if(!f||f.size>5*1024*1024){toast('Image too large','error');return}
  const url=await uploadChatImage(chatId,f);
  if(url){await sendMessage(chatId,'','image',url,reply);reply=null;document.getElementById('replyBar').classList.remove('show')}
  ev.target.value='';
}

function openViewer(url){document.getElementById('viewerImg').src=url;document.getElementById('imgViewer').classList.add('active')}
function closeViewer(){document.getElementById('imgViewer').classList.remove('active')}

function showInfo(){
  document.getElementById('infoModal').classList.add('active');
  const img=document.getElementById('infoImg'),pl=document.getElementById('infoPl');
  if(partnerData){
    document.getElementById('infoName').textContent=partnerData.name;
    if(partnerData.profileImage){img.src=partnerData.profileImage;img.style.display='block';pl.style.display='none'}
    else{img.style.display='none';pl.style.display='flex';pl.textContent=partnerData.name[0]}
    document.getElementById('infoStatus').textContent=partnerData.onlineStatus?'Online':'Offline';
  }
}
function closeModal(id){document.getElementById(id).classList.remove('active')}
function deleteChat(){
  if(!confirm('Delete this conversation?'))return;closeModal('infoModal');
  REFS.messages.child(chatId).remove().then(()=>{REFS.chats.child(chatId).update({lastMessage:'',lastTime:0});goTo('home.html')});
}
</script>
</body>
</html>
