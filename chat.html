<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#0B1220">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='36' fill='%2300A884'/%3E%3Ctext x='96' y='130' font-size='130' font-weight='900' text-anchor='middle' fill='%23FFFFFF' font-family='sans-serif'%3ES%3C/text%3E%3C/svg%3E" sizes="192x192">
<title>SEVEN - Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Poppins:wght@400;500;600;700;800&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/mobile.css">
<link rel="stylesheet" href="css/dark.css">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
</head>
<body>
<div class="topbar">
  <button class="topbar-btn" onclick="goTo('home.html')"><i class="fa-solid fa-arrow-left"></i></button>
  <img id="chatAvatar" src="" class="topbar-btn" style="border-radius:50%;width:34px;height:34px;object-fit:cover;display:none" alt="">
  <div id="chatAvatarPl" class="avatar avatar-sm avatar-placeholder" style="width:34px;height:34px;font-size:14px;display:none">?</div>
  <div class="topbar-center">
    <div class="topbar-title" id="chatName">Loading...</div>
    <div class="topbar-sub" id="chatStatus">...</div>
  </div>
  <button class="topbar-btn" onclick="showInfo()"><i class="fa-solid fa-ellipsis-vertical"></i></button>
</div>

<div class="reply-bar" id="replyBar">
  <div class="reply-bar-info"><div class="reply-bar-name" id="replyName">Replying</div><div class="reply-bar-text" id="replyText"></div></div>
  <button class="reply-bar-cancel" onclick="cancelReply()"><i class="fa-solid fa-xmark"></i></button>
</div>

<div class="msg-container" id="msgContainer">
  <div id="msgList"></div>
  <div id="typingInd" class="typing-ind" style="display:none"><span></span><span></span><span></span><span style="font-size:11px;color:var(--text3);margin-left:6px">typing...</span></div>
  <div style="height:90px;flex-shrink:0"></div>
</div>

<div class="chat-input-wrap">
  <div class="chat-input-field">
    <textarea class="chat-input-text" id="chatInput" placeholder="Message..." rows="1" oninput="autoResize(this);setTyping(CId,this.value.length>0)" onkeydown="handleKey(event)"></textarea>
    <div class="chat-input-actions"><button class="chat-action-btn" onclick="document.getElementById('imgInput').click()"><i class="fa-solid fa-camera"></i></button></div>
  </div>
  <button class="chat-send" id="sendBtn" onclick="sendMsg()" disabled><i class="fa-solid fa-paper-plane"></i></button>
</div>
<input type="file" id="imgInput" accept="image/*" style="display:none" onchange="handleImage(event)">

<div class="img-viewer" id="imgViewer">
  <button class="img-viewer-close" onclick="closeViewer()"><i class="fa-solid fa-xmark"></i></button>
  <div id="viewerProgress" class="img-viewer-progress" style="display:none">
    <div class="upload-progress" style="width:200px;margin:0 auto"><div class="upload-progress-bar" style="width:0%"></div></div>
    <div class="viewer-progress-text" style="color:#fff;font-size:14px;margin-top:8px;text-align:center">0%</div>
  </div>
  <img id="viewerImg" src="" alt="" style="display:none">
  <button class="img-viewer-dl" onclick="dlImg()"><i class="fa-solid fa-download"></i> Download</button>
</div>

<div class="modal-overlay" id="infoModal">
  <div class="modal" style="text-align:center">
    <img id="infoImg" src="" class="avatar avatar-xl" style="display:none;margin:0 auto" alt="">
    <div id="infoPl" class="avatar avatar-xl avatar-placeholder" style="margin:0 auto;font-size:32px">?</div>
    <div class="modal-title" id="infoName" style="margin-top:10px">User</div>
    <div style="color:var(--text3);font-size:14px;margin-bottom:16px" id="infoStatus">Offline</div>
    <button class="btn btn-danger btn-full" onclick="delChat()">Delete Chat</button>
    <button class="btn btn-ghost btn-full" onclick="closeModal('infoModal')" style="margin-top:8px">Close</button>
  </div>
</div>

<!-- FORWARD MODAL -->
<div class="modal-overlay" id="fwdModal">
  <div class="modal"><div class="modal-title">Forward to</div>
    <div class="search-field" style="margin-bottom:10px"><i class="fa-solid fa-magnifying-glass" style="font-size:14px;color:var(--text3)"></i><input type="text" id="fwdSearch" placeholder="Search chats..." oninput="searchFwd(this.value)"></div>
    <div id="fwdResults" style="max-height:300px;overflow-y:auto"></div>
    <button class="btn btn-ghost btn-full" onclick="closeModal('fwdModal')" style="margin-top:8px">Cancel</button>
  </div>
</div>

<script src="js/firebase.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script src="js/chat.js"></script>
<script>
function escapeHtml(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}
let CId=null,PId=null,PD=null,reply=null,editing=null;

document.addEventListener('DOMContentLoaded',()=>{
  if(!isLoggedIn()){goTo('login.html');return}
  initPresence();
  const p=new URLSearchParams(window.location.search);
  CId=p.get('id');PId=p.get('partner');
  if(!CId||!PId){toast('Invalid chat','error');goTo('home.html');return}
  // Animations
  if(localStorage.getItem('anim')==='off')document.body.classList.add('no-anim');
  loadPartner();
  msgUnsub=listenMessages(CId,ms=>{renderMsgs(ms);markSeen(CId)});
  listenTyping(CId,()=>{const i=document.getElementById('typingInd');i.style.display='flex';setTimeout(()=>i.style.display='none',3000)});
});

async function loadPartner(){
  const u=await getUserById(PId);
  if(!u){document.getElementById('chatName').textContent='Unknown';return}
  PD=u;document.getElementById('chatName').textContent=u.name;
  const img=document.getElementById('chatAvatar'),pl=document.getElementById('chatAvatarPl');
  if(u.profileImage){img.src=u.profileImage;img.style.display='block';pl.style.display='none'}else{img.style.display='none';pl.style.display='flex';pl.textContent=u.name[0]}
  REFS.presence.child(PId).on('value',s=>{const st=document.getElementById('chatStatus');const d=s.val();if(d&&d.online){st.textContent='Online';st.className='topbar-sub online'}else{st.textContent='Offline';st.className='topbar-sub'}});
}

function renderMsgs(msgs){
  const c=document.getElementById('msgList');const my=uid();c.innerHTML='';
  let lastDate='';
  msgs.forEach(m=>{
    // Date separator
    const d=new Date(m.timestamp).toDateString();
    if(d!==lastDate){lastDate=d;const sep=document.createElement('div');sep.className='date-sep';sep.innerHTML='<span>'+new Date(m.timestamp).toLocaleDateString([],{day:'numeric',month:'short',year:'numeric'})+'</span>';c.appendChild(sep)}
    const mine=m.senderId===my;
    const wrap=document.createElement('div');
    wrap.className='msg-wrap '+(mine?'sent':'rcvd');
    wrap.dataset.id=m.id;

    // Swipe reply indicator
    const swi=document.createElement('div');swi.className='swipe-indicator';swi.innerHTML='<i class="fa-solid fa-reply"></i>';wrap.appendChild(swi);

    const msg=document.createElement('div');
    msg.className='msg '+(mine?'sent':'rcvd');
    if(m.pinned)msg.innerHTML+='<div class="msg-pin"><i class="fa-solid fa-thumbtack"></i></div>';

    let html='';
    // Reply quote
    if(m.replyTo)html+=`<div style="font-size:11px;color:${mine?'rgba(255,255,255,.5)':'var(--primary)'};margin-bottom:3px;border-left:2px solid ${mine?'rgba(255,255,255,.3)':'var(--primary)'};padding-left:7px">${escapeHtml(m.replyTo.text||'')}</div>`;
    // Image
    if(m.type==='image'&&m.imageUrl&&!m.deleted)html+=`<img src="${m.imageUrl}" class="msg-img" alt="Image">`;
    // Deleted
    if(m.deleted){html+=`<div class="msg-deleted">${m.deleted==='everyone'?'This message was deleted':'You deleted this message'}</div>`}
    // Text
    else if(m.text){
      if(m.starred)html+=`<span class="msg-star"><i class="fa-solid fa-star" style="color:var(--warning);font-size:11px"></i></span>`;
      html+=`<div class="msg-text">${escapeHtml(m.text)}</div>`;
    }
    // Edited label
    if(m.edited&&!m.deleted)html+=`<span class="msg-edited">edited</span>`;
    // Meta: time + status
    html+=`<div class="msg-meta">${formatTime(m.timestamp)}${mine?`<span class="msg-status ${m.seen?'seen':m.delivered?'delivered':''}">${m.seen?'<i class="fa-solid fa-check-double"></i>':m.delivered?'<i class="fa-solid fa-check-double"></i>':'<i class="fa-solid fa-check"></i>'}</span>`:''}</div>`;
    msg.innerHTML=html;
    // Attach image click
    const imgEl=msg.querySelector('.msg-img');
    if(imgEl)imgEl.onclick=(e)=>{e.stopPropagation();openViewer(imgEl.src)};
    wrap.appendChild(msg);

    // Swipe to reply (touch)
    let sx=0,swiping=false;
    wrap.addEventListener('touchstart',e=>{sx=e.touches[0].clientX});
    wrap.addEventListener('touchmove',e=>{
      const dx=e.touches[0].clientX-sx;
      if(dx>30&&dx<120&&!swiping){swiping=true;wrap.classList.add('swiping');navigator.vibrate&&navigator.vibrate(10)}
      if(dx<30)swiping=false;
    });
    wrap.addEventListener('touchend',e=>{
      if(wrap.classList.contains('swiping')){wrap.classList.remove('swiping');replyTo(m.text,m.id);}
      swiping=false;
    });

    // Long press
    let lt;wrap.addEventListener('mousedown',()=>{lt=setTimeout(()=>showMenu(m),400)});wrap.addEventListener('mouseup',()=>clearTimeout(lt));wrap.addEventListener('mouseleave',()=>clearTimeout(lt));wrap.addEventListener('touchstart',()=>{lt=setTimeout(()=>showMenu(m),400)});wrap.addEventListener('touchend',()=>clearTimeout(lt));

    c.appendChild(wrap);
  });
  document.getElementById('msgContainer').scrollTop=document.getElementById('msgContainer').scrollHeight;
}

let _ctxMsg=null;
function showMenu(m){
  _ctxMsg=m;
  const my=uid();const mine=m.senderId===my;
  const ov=document.createElement('div');ov.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;z-index:199;background:rgba(0,0,0,.3)';ov.onclick=()=>{menu.remove();ov.remove()};
  const menu=document.createElement('div');menu.style.cssText='position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-radius:14px 14px 0 0;z-index:200;padding:14px;box-shadow:0 -4px 24px rgba(0,0,0,.4);animation:fadeIn .2s ease;border-top:1px solid var(--glass-border)';
  const t=_ctxMsg.text||'';
  let btns='';
  btns+=`<button class="btn btn-ghost btn-full" style="justify-content:flex-start;padding:12px 16px" onclick="closeMenu();ctxReply()"><i class="fa-solid fa-reply"></i> Reply</button>`;
  btns+=`<button class="btn btn-ghost btn-full" style="justify-content:flex-start;padding:12px 16px" onclick="closeMenu();ctxCopy()"><i class="fa-regular fa-copy"></i> Copy</button>`;
  if(!_ctxMsg.deleted){
    btns+=`<button class="btn btn-ghost btn-full" style="justify-content:flex-start;padding:12px 16px" onclick="closeMenu();ctxForward()"><i class="fa-solid fa-forward"></i> Forward</button>`;
    if(mine){
      btns+=`<button class="btn btn-ghost btn-full" style="justify-content:flex-start;padding:12px 16px" onclick="closeMenu();ctxEdit()"><i class="fa-solid fa-pen"></i> Edit</button>`;
      btns+=`<button class="btn btn-ghost btn-full" style="justify-content:flex-start;padding:12px 16px" onclick="closeMenu();ctxPin()"><i class="fa-solid fa-thumbtack"></i> ${_ctxMsg.pinned?'Unpin':'Pin'}</button>`;
    }
    btns+=`<button class="btn btn-ghost btn-full" style="justify-content:flex-start;padding:12px 16px" onclick="closeMenu();ctxStar()"><i class="fa-regular fa-star"></i> ${_ctxMsg.starred?'Unstar':'Star'}</button>`;
  }
  if(mine){
    if(!_ctxMsg.deleted)btns+=`<button class="btn btn-ghost btn-full" style="justify-content:flex-start;padding:12px 16px;color:var(--danger)" onclick="closeMenu();ctxDelMe()"><i class="fa-solid fa-trash-can"></i> Delete for me</button>`;
    btns+=`<button class="btn btn-ghost btn-full" style="justify-content:flex-start;padding:12px 16px;color:var(--danger)" onclick="closeMenu();ctxDelAll()"><i class="fa-solid fa-trash-can"></i> Delete for everyone</button>`;
  }
  menu.innerHTML=btns;document.body.appendChild(ov);document.body.appendChild(menu);
  window.closeMenu=()=>{menu.remove();ov.remove()};
}
function ctxReply(){replyTo(_ctxMsg.text,_ctxMsg.id)}
function ctxCopy(){navigator.clipboard.writeText(_ctxMsg.text||'').then(()=>toast('Copied','success')).catch(()=>{})}
function ctxForward(){
  if(_ctxMsg.type==='image'&&_ctxMsg.imageUrl)window._fwd={text:'',imgUrl:_ctxMsg.imageUrl,type:'image'};
  else window._fwd={text:_ctxMsg.text||'',imgUrl:'',type:'text'};
  document.getElementById('fwdModal').classList.add('active');document.getElementById('fwdResults').innerHTML='';
  getMyChats(chats=>showFwdResults(chats));
}
function ctxEdit(){editMsg(_ctxMsg.id,_ctxMsg.text)}
async function ctxPin(){const v=!_ctxMsg.pinned;await REFS.messages.child(CId).child(_ctxMsg.id).child('pinned').set(v);_ctxMsg.pinned=v;toast(v?'Pinned':'Unpinned','success')}
async function ctxStar(){const v=!_ctxMsg.starred;await REFS.messages.child(CId).child(_ctxMsg.id).child('starred').set(v);_ctxMsg.starred=v;toast(v?'Starred':'Unstarred','success')}
async function ctxDelMe(){if(!confirm('Delete for you?'))return;await REFS.messages.child(CId).child(_ctxMsg.id).child('deleted').set('me')}
async function ctxDelAll(){if(!confirm('Delete for everyone?'))return;await REFS.messages.child(CId).child(_ctxMsg.id).update({deleted:'everyone',text:'',imageUrl:null})}
function replyTo(text,id){reply={text,id};document.getElementById('replyBar').classList.add('show');document.getElementById('replyName').textContent='Replying';document.getElementById('replyText').innerHTML=text||'<i class="fa-solid fa-camera"></i> Image';document.getElementById('chatInput').focus()}
function cancelReply(){reply=null;editing=null;document.getElementById('replyBar').classList.remove('show');document.getElementById('replyName').textContent='Replying'}
function editMsg(id,t){
  editing={id,text:t};
  document.getElementById('replyBar').classList.add('show');
  document.getElementById('replyName').textContent='Editing';
  document.getElementById('replyText').textContent=t;
  document.getElementById('chatInput').value=t;document.getElementById('chatInput').focus();autoResize(document.getElementById('chatInput'));
  document.getElementById('sendBtn').disabled=false;
}
function showFwdResults(chats){
  const c=document.getElementById('fwdResults');c.innerHTML='';
  chats.forEach(ch=>{
    const d=document.createElement('div');d.className='forward-user';
    d.innerHTML=`${ch.img?`<img class="avatar avatar-sm" src="${ch.img}">`:`<div class="avatar avatar-sm avatar-placeholder" style="font-size:13px">${ch.name[0]}</div>`}<div style="font-weight:500">${escapeHtml(ch.name)}</div>`;
    d.onclick=async()=>{
      closeModal('fwdModal');
      const fwd=window._fwd;
      if(fwd.type==='image'&&fwd.imgUrl)await sendMessage(ch.id,'','image',fwd.imgUrl);
      else if(fwd.text)await sendMessage(ch.id,'↪ Forwarded: '+fwd.text,'text');
      toast('Forwarded','success');
    };
    c.appendChild(d);
  });
}
function searchFwd(q){
  document.querySelectorAll('.forward-user').forEach(el=>{
    el.style.display=el.textContent.toLowerCase().includes(q.toLowerCase())?'flex':'none';
  });
}

async function sendMsg(){
  const i=document.getElementById('chatInput');const t=i.value.trim();if(!t)return;
  if(editing){
    await REFS.messages.child(CId).child(editing.id).update({text:t,edited:true});
    editing=null;cancelReply();
  }else{
    await sendMessage(CId,t,'text','',reply);
    reply=null;cancelReply();
  }
  i.value='';autoResize(i);setTyping(CId,false);document.getElementById('sendBtn').disabled=true;
}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg()};document.getElementById('sendBtn').disabled=!e.target.value.trim()}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,110)+'px'}

async function handleImage(ev){
  const f=ev.target.files[0];if(!f||f.size>5*1024*1024){toast('Image too large','error');return}
  const wrap=document.querySelector('.chat-input-wrap');
  const prog=document.createElement('div');prog.className='upload-progress';prog.style.cssText='margin:4px 10px 2px';
  const bar=document.createElement('div');bar.className='upload-progress-bar';bar.style.width='0%';
  prog.appendChild(bar);wrap.parentNode.insertBefore(prog,wrap.nextSibling);
  const url=await uploadChatImage(CId,f,(loaded,total)=>{
    const pct=Math.min(100,Math.round(loaded/total*100));
    bar.style.width=pct+'%';
  });
  if(url){bar.classList.add('done');setTimeout(()=>prog.remove(),600);await sendMessage(CId,'','image',url,reply);reply=null;cancelReply()}
  else{prog.remove();toast('Upload failed','error')}
  ev.target.value='';
}
function openViewer(url){
  const img=document.getElementById('viewerImg');
  document.getElementById('imgViewer').classList.add('active');
  img.style.display='none';img.style.transform='scale(1)';img.style.transition='none';
  const pg=document.getElementById('viewerProgress');
  const bar=pg.querySelector('.upload-progress-bar');
  pg.style.display='flex';bar.style.width='0%';pg.querySelector('.viewer-progress-text').textContent='0%';
  const xhr=new XMLHttpRequest();
  xhr.open('GET',url);
  xhr.responseType='blob';
  xhr.onprogress=e=>{if(e.lengthComputable){const p=Math.min(100,Math.round(e.loaded/e.total*100));bar.style.width=p+'%';pg.querySelector('.viewer-progress-text').textContent=p+'%'}};
  xhr.onload=()=>{if(xhr.status===200){img.src=URL.createObjectURL(xhr.response);img.style.display='block';pg.style.display='none';window._viewerBlob=xhr.response}};
  xhr.onerror=()=>{pg.style.display='none';img.style.display='block';img.src=url};
  xhr.send();
}
function closeViewer(){
  document.getElementById('imgViewer').classList.remove('active');
  if(window._viewerBlob){URL.revokeObjectURL(document.getElementById('viewerImg').src);window._viewerBlob=null}
}
function dlImg(){
  const img=document.getElementById('viewerImg');
  const a=document.createElement('a');
  a.href=window._viewerBlob?URL.createObjectURL(window._viewerBlob):img.src;
  a.download='seven_image_'+Date.now();
  a.click();
}

// Pinch zoom + swipe to close on image viewer
document.getElementById('imgViewer').addEventListener('touchstart',function(e){
  if(e.touches.length===2){
    this._pinchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    this._pinchScale=1;
  }
  if(e.touches.length===1){
    this._swipeStart={x:e.touches[0].clientX,y:e.touches[0].clientY};
  }
});
document.getElementById('imgViewer').addEventListener('touchmove',function(e){
  const img=document.getElementById('viewerImg');
  if(e.touches.length===2){
    const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    const scale=dist/this._pinchDist;
    this._pinchScale=Math.max(0.5,Math.min(3,scale));
    img.style.transition='none';
    img.style.transform='scale('+this._pinchScale+')';
  }
  if(e.touches.length===1&&this._swipeStart){
    const dy=e.touches[0].clientY-this._swipeStart.y;
    if(dy>80){closeViewer();this._swipeStart=null}
  }
});
document.getElementById('imgViewer').addEventListener('touchend',function(e){
  this._swipeStart=null;
  if(this._pinchScale<1){closeViewer()}
});

function showInfo(){
  document.getElementById('infoModal').classList.add('active');
  const img=document.getElementById('infoImg'),pl=document.getElementById('infoPl');
  if(PD){document.getElementById('infoName').textContent=PD.name;
    if(PD.profileImage){img.src=PD.profileImage;img.style.display='block';pl.style.display='none'}else{img.style.display='none';pl.style.display='flex';pl.textContent=PD.name[0]}
    document.getElementById('infoStatus').textContent=PD.onlineStatus?'Online':'Offline';
  }
}
function closeModal(id){document.getElementById(id).classList.remove('active')}
function delChat(){if(!confirm('Delete this conversation?'))return;closeModal('infoModal');REFS.messages.child(CId).remove().then(()=>{REFS.chats.child(CId).update({lastMessage:'',lastTime:0});goTo('home.html')})}
</script>
</body>
</html>
