<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Login - SEVEN</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card glass">
      <div class="auth-header">
        <div class="auth-logo">
          <i class="fas fa-heart"></i>
        </div>
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Sign in to SEVEN</p>
      </div>
      <form id="loginForm" class="auth-form" autocomplete="off">
        <div class="input-group">
          <div class="input-icon">
            <i class="fas fa-user"></i>
          </div>
          <input type="text" id="loginUsername" class="auth-input" placeholder="Username" required autocomplete="off">
        </div>
        <div class="input-group">
          <div class="input-icon">
            <i class="fas fa-lock"></i>
          </div>
          <input type="password" id="loginPassword" class="auth-input" placeholder="Password" required autocomplete="off">
          <button type="button" class="toggle-password" onclick="togglePassword('loginPassword', this)">
            <i class="fas fa-eye"></i>
          </button>
        </div>
        <button type="submit" class="auth-btn glass" id="loginBtn">
          <span class="btn-text">Sign In</span>
          <div class="btn-loader" style="display:none">
            <div class="spinner"></div>
          </div>
        </button>
      </form>
      <div class="auth-footer">
        <p>Don't have an account? <a href="register.html" class="auth-link">Create One</a></p>
      </div>
    </div>
  </div>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/login.js"></script>
</body>
</html>
