<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sign In - SEVEN</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo"><i class="fas fa-heart"></i></div>
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Sign in to continue</p>
      </div>
      <form id="loginForm" autocomplete="off">
        <div class="field">
          <div class="field-icon"><i class="fas fa-user"></i></div>
          <input type="text" id="loginUsername" class="field-input" placeholder="Username" required>
        </div>
        <div class="field">
          <div class="field-icon"><i class="fas fa-lock"></i></div>
          <input type="password" id="loginPassword" class="field-input" placeholder="Password" required>
          <button type="button" class="field-toggle" onclick="toggleField('loginPassword',this)">
            <i class="fas fa-eye"></i>
          </button>
        </div>
        <button type="submit" class="auth-btn" id="loginBtn">
          <span class="btn-text">Sign In</span>
          <span class="btn-load" style="display:none"><i class="fas fa-circle-notch fa-spin"></i></span>
        </button>
      </form>
      <div class="auth-footer">
        <p>No account? <a href="register.html">Create one</a></p>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics-compat.js"></script>
  <script src="../js/github-token.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/login.js"></script>
</body>
</html>
