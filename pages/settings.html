<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Settings - SEVEN</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/settings.css">
</head>
<body>
  <div class="settings-page">
    <header class="settings-header glass">
      <button class="header-btn" onclick="goBack()">
        <i class="fas fa-arrow-left"></i>
      </button>
      <h1>Settings</h1>
      <div></div>
    </header>
    <div class="settings-content">
      <div class="settings-section glass">
        <h2 class="settings-section-title">
          <i class="fas fa-bell"></i> Notifications
        </h2>
        <div class="settings-item">
          <div class="settings-item-info">
            <span class="settings-item-label">Push Notifications</span>
            <span class="settings-item-desc">Receive message notifications</span>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="notifToggle" checked onchange="toggleNotifications(this.checked)">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
      <div class="settings-section glass">
        <h2 class="settings-section-title">
          <i class="fas fa-palette"></i> Appearance
        </h2>
        <div class="settings-item">
          <div class="settings-item-info">
            <span class="settings-item-label">Dark Theme</span>
            <span class="settings-item-desc">Dark mode is always enabled</span>
          </div>
          <i class="fas fa-moon settings-item-icon"></i>
        </div>
      </div>
      <div class="settings-section glass">
        <h2 class="settings-section-title">
          <i class="fas fa-info-circle"></i> About
        </h2>
        <div class="settings-item">
          <div class="settings-item-info">
            <span class="settings-item-label">Version</span>
            <span class="settings-item-desc">1.0.0</span>
          </div>
        </div>
        <div class="settings-item">
          <div class="settings-item-info">
            <span class="settings-item-label">Brand</span>
            <span class="settings-item-desc">SEVEN</span>
          </div>
        </div>
        <div class="settings-item">
          <div class="settings-item-info">
            <span class="settings-item-label">App</span>
            <span class="settings-item-desc">SaYeM Love</span>
          </div>
        </div>
      </div>
      <div class="settings-section glass">
        <button class="danger-btn settings-danger-btn" onclick="clearAllData()">
          <i class="fas fa-trash-alt"></i> Clear All Data
        </button>
      </div>
    </div>
  </div>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>
  <script src="../js/github-token.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/notification.js"></script>
  <script src="../js/settings.js"></script>
</body>
</html>
