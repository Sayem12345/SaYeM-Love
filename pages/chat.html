<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Chats - SEVEN</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/chat.css">
</head>
<body>
  <div id="app">

    <!-- Chat List View -->
    <div id="chatListView" class="view active">
      <header class="top-bar">
        <div class="top-left">
          <h1 class="top-brand">SEVEN</h1>
        </div>
        <div class="top-right">
          <button class="top-btn" onclick="openSearch()" aria-label="Search"><i class="fas fa-search"></i></button>
          <button class="top-btn" onclick="goProfile()" aria-label="Profile"><i class="fas fa-user-circle"></i></button>
          <button class="top-btn" onclick="handleLogout()" aria-label="Logout"><i class="fas fa-sign-out-alt"></i></button>
        </div>
      </header>
      <div class="list-scroll" id="chatListWrap">
        <div id="chatList"></div>
        <div id="emptyChats" class="empty-state" style="display:none">
          <div class="empty-icon"><i class="fas fa-comments"></i></div>
          <h3>No chats yet</h3>
          <p>Search for someone to talk to</p>
          <button class="btn-outline" onclick="openSearch()"><i class="fas fa-search"></i> Find Friends</button>
        </div>
      </div>
    </div>

    <!-- Conversation View -->
    <div id="convView" class="view">
      <header class="top-bar">
        <button class="top-btn" onclick="closeConv()" aria-label="Back"><i class="fas fa-arrow-left"></i></button>
        <div class="conv-user" onclick="showUserInfo()">
          <div class="conv-avatar">
            <img id="convAvatar" src="../assets/images/default-avatar.svg" alt="">
            <span id="convOnline" class="dot"></span>
          </div>
          <div class="conv-meta">
            <span id="convName" class="conv-name">User</span>
            <span id="convStatus" class="conv-status">offline</span>
          </div>
        </div>
        <button class="top-btn" onclick="openSearch()" aria-label="Search"><i class="fas fa-search"></i></button>
      </header>
      <div class="msg-scroll" id="msgWrap">
        <div id="msgList"></div>
        <div id="typingBox" class="typing-box" style="display:none">
          <span class="typing-dots"><span></span><span></span><span></span></span>
          <span id="typingLabel">typing</span>
        </div>
      </div>
      <div class="composer">
        <div id="replyBox" class="reply-bar" style="display:none">
          <div class="reply-info">
            <span class="reply-tag">Replying</span>
            <span id="replyText" class="reply-msg"></span>
          </div>
          <button class="reply-close" onclick="cancelReply()"><i class="fas fa-times"></i></button>
        </div>
        <div class="composer-row">
          <button class="comp-btn" onclick="pickImage()" aria-label="Image"><i class="fas fa-image"></i></button>
          <input type="file" id="imagePick" accept="image/*" style="display:none" onchange="sendImage(event)">
          <div class="comp-input-wrap">
            <textarea id="msgInput" class="comp-input" rows="1" placeholder="Type a message..." oninput="autoHeight(this);typing()"></textarea>
          </div>
          <button class="comp-btn comp-send" id="sendBtn" onclick="sendMsg()" aria-label="Send"><i class="fas fa-paper-plane"></i></button>
        </div>
      </div>
    </div>

  </div>

  <!-- Search Modal -->
  <div id="searchModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeSearch()">
    <div class="modal-box">
      <div class="modal-head">
        <h2>Find People</h2>
        <button class="modal-x" onclick="closeSearch()"><i class="fas fa-times"></i></button>
      </div>
      <div class="search-field">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="searchInput" class="search-input" placeholder="Search username..." oninput="doSearch(this.value)">
      </div>
      <div id="searchResults" class="search-results"></div>
    </div>
  </div>

  <!-- Image Preview Modal -->
  <div id="imgModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeImg()">
    <div class="img-viewer">
      <button class="modal-x img-x" onclick="closeImg()"><i class="fas fa-times"></i></button>
      <img id="fullImg" class="full-img" src="" alt="">
      <div class="img-actions">
        <button class="img-action" onclick="downloadImg()"><i class="fas fa-download"></i> Download</button>
      </div>
    </div>
  </div>

  <!-- User Info Modal -->
  <div id="userModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeUserInfo()">
    <div class="modal-box modal-sm">
      <div class="modal-head">
        <h2>User Info</h2>
        <button class="modal-x" onclick="closeUserInfo()"><i class="fas fa-times"></i></button>
      </div>
      <div class="user-card">
        <div class="user-card-avatar">
          <img id="userInfoAvatar" src="../assets/images/default-avatar.svg" alt="">
        </div>
        <h3 id="userInfoName">-</h3>
        <p class="user-card-uname">@<span id="userInfoUsername">-</span></p>
        <div class="user-card-badges">
          <span id="userInfoOnline" class="badge badge-on" style="display:none"><i class="fas fa-circle"></i> Online</span>
          <span id="userInfoOffline" class="badge badge-off"><i class="fas fa-circle"></i> Offline</span>
        </div>
        <p class="user-card-last">Last seen: <span id="userInfoLast">-</span></p>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics-compat.js"></script>
  <script src="../js/github-token.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/search.js"></script>
  <script src="../js/chat.js"></script>
  <script src="../js/notification.js"></script>
</body>
</html>
