<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Profile - SEVEN</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/profile.css">
</head>
<body>
  <div class="profile-page">
    <header class="top-bar">
      <button class="top-btn" onclick="backHome()"><i class="fas fa-arrow-left"></i></button>
      <h1 class="top-title">Profile</h1>
      <button class="top-btn" onclick="goSettings()"><i class="fas fa-cog"></i></button>
    </header>
    <div class="profile-scroll">
      <div class="profile-avatar-box">
        <div class="profile-avatar-wrap">
          <img id="profAvatar" src="../assets/images/default-avatar.svg" alt="" class="prof-avatar">
          <button class="prof-cam" onclick="pickAvatar()"><i class="fas fa-camera"></i></button>
          <input type="file" id="avatarPick" accept="image/*" style="display:none" onchange="changeAvatar(event)">
        </div>
      </div>
      <div class="profile-section">
        <div class="prof-field">
          <label class="prof-label">Full Name</label>
          <div class="prof-input-group">
            <input type="text" id="profName" class="prof-input" placeholder="Your full name">
            <button class="prof-edit" onclick="enableEdit('profName')"><i class="fas fa-pen"></i></button>
          </div>
        </div>
        <div class="prof-field">
          <label class="prof-label">Username</label>
          <div class="prof-input-group">
            <input type="text" id="profUsername" class="prof-input" placeholder="Username" readonly>
            <button class="prof-edit" onclick="enableEdit('profUsername')"><i class="fas fa-pen"></i></button>
          </div>
          <div id="profUsernameStatus" class="prof-status"></div>
        </div>
        <div class="prof-field">
          <label class="prof-label">New Password</label>
          <div class="prof-input-group">
            <input type="password" id="profPass" class="prof-input" placeholder="Leave blank to keep current">
            <button class="prof-edit" onclick="enableEdit('profPass')"><i class="fas fa-pen"></i></button>
          </div>
        </div>
        <div class="prof-field">
          <label class="prof-label">Confirm Password</label>
          <div class="prof-input-group">
            <input type="password" id="profConfirm" class="prof-input" placeholder="Repeat new password">
          </div>
        </div>
        <button class="btn-save" onclick="saveProfile()"><i class="fas fa-check"></i> Save Changes</button>
      </div>
      <div class="profile-section">
        <button class="btn-danger" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics-compat.js"></script>
  <script src="../js/github-token.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/profile.js"></script>
</body>
</html>
