<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Create Account - SEVEN</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo"><i class="fas fa-heart"></i></div>
        <h1 class="auth-title">Join SEVEN</h1>
        <p class="auth-subtitle">Create your account</p>
      </div>
      <form id="registerForm" autocomplete="off">
        <div class="field">
          <div class="field-icon"><i class="fas fa-user-tag"></i></div>
          <input type="text" id="regName" class="field-input" placeholder="Full Name" required>
        </div>
        <div class="field">
          <div class="field-icon"><i class="fas fa-at"></i></div>
          <input type="text" id="regUsername" class="field-input" placeholder="Username" required>
          <span id="regUsernameStatus" class="field-status"></span>
        </div>
        <div class="field">
          <div class="field-icon"><i class="fas fa-lock"></i></div>
          <input type="password" id="regPassword" class="field-input" placeholder="Password" required>
          <button type="button" class="field-toggle" onclick="toggleField('regPassword',this)">
            <i class="fas fa-eye"></i>
          </button>
        </div>
        <div class="field">
          <div class="field-icon"><i class="fas fa-check-circle"></i></div>
          <input type="password" id="regConfirm" class="field-input" placeholder="Confirm Password" required>
          <button type="button" class="field-toggle" onclick="toggleField('regConfirm',this)">
            <i class="fas fa-eye"></i>
          </button>
        </div>
        <div id="regStrength" class="field-hint"></div>
        <button type="submit" class="auth-btn" id="registerBtn">
          <span class="btn-text">Create Account</span>
          <span class="btn-load" style="display:none"><i class="fas fa-circle-notch fa-spin"></i></span>
        </button>
      </form>
      <div class="auth-footer">
        <p>Already have an account? <a href="login.html">Sign in</a></p>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics-compat.js"></script>
  <script src="../js/github-token.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/register.js"></script>
</body>
</html>
