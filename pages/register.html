<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Register - SEVEN</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card glass">
      <div class="auth-header">
        <div class="auth-logo">
          <i class="fas fa-heart"></i>
        </div>
        <h1 class="auth-title">Create Account</h1>
        <p class="auth-subtitle">Join SEVEN today</p>
      </div>
      <form id="registerForm" class="auth-form" autocomplete="off">
        <div class="input-group">
          <div class="input-icon">
            <i class="fas fa-user-tag"></i>
          </div>
          <input type="text" id="regFullName" class="auth-input" placeholder="Full Name" required autocomplete="off">
        </div>
        <div class="input-group">
          <div class="input-icon">
            <i class="fas fa-at"></i>
          </div>
          <input type="text" id="regUsername" class="auth-input" placeholder="Username" required autocomplete="off">
          <div class="input-status" id="usernameStatus"></div>
        </div>
        <div class="input-group">
          <div class="input-icon">
            <i class="fas fa-lock"></i>
          </div>
          <input type="password" id="regPassword" class="auth-input" placeholder="Password" required autocomplete="off">
          <button type="button" class="toggle-password" onclick="togglePassword('regPassword', this)">
            <i class="fas fa-eye"></i>
          </button>
        </div>
        <div class="input-group">
          <div class="input-icon">
            <i class="fas fa-check-circle"></i>
          </div>
          <input type="password" id="regConfirmPassword" class="auth-input" placeholder="Confirm Password" required autocomplete="off">
          <button type="button" class="toggle-password" onclick="togglePassword('regConfirmPassword', this)">
            <i class="fas fa-eye"></i>
          </button>
        </div>
        <div id="passwordStrength" class="password-strength"></div>
        <button type="submit" class="auth-btn glass" id="registerBtn">
          <span class="btn-text">Create Account</span>
          <div class="btn-loader" style="display:none">
            <div class="spinner"></div>
          </div>
        </button>
      </form>
      <div class="auth-footer">
        <p>Already have an account? <a href="login.html" class="auth-link">Sign In</a></p>
      </div>
    </div>
  </div>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics-compat.js"></script>
  <script src="../js/github-token.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/register.js"></script>
</body>
</html>
