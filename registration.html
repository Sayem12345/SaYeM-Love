<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#0B1220">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%237C3AED'/%3E%3Cstop offset='100%25' stop-color='%238B5CF6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='96' cy='96' r='96' fill='url(%23g)'/%3E%3Cpath d='M38,75 Q96,49 154,75 Q157,82 154,90 Q96,128 38,90 Q35,82 38,75Z' fill='%230B1220'/%3E%3Cpath d='M49,81 Q96,60 143,81 L141,88 Q96,116 51,88Z' fill='%231E293B'/%3E%3Cellipse cx='71' cy='88' rx='6' ry='8' fill='%2306B6D4'/%3E%3Cellipse cx='121' cy='88' rx='6' ry='8' fill='%2306B6D4'/%3E%3Cellipse cx='71' cy='88' rx='2' ry='3' fill='%23fff'/%3E%3Cellipse cx='121' cy='88' rx='2' ry='3' fill='%23fff'/%3E%3Cpath d='M79,103 Q96,111 113,103' stroke='%2306B6D4' stroke-width='2' fill='none' stroke-linecap='round'/%3E%3Ctext x='96' y='145' font-size='16' font-weight='900' text-anchor='middle' fill='%23fff' font-family='Arial,Helvetica,sans-serif' letter-spacing='2'%3ESEVEN%3C/text%3E%3C/svg%3E" sizes="192x192">
<title>SEVEN - Register</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Poppins:wght@400;500;600;700;800&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/mobile.css">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
</head>
<body>
<div class="auth-page">
  <div style="position:fixed;top:12px;left:12px;z-index:10;width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--glass);backdrop-filter:blur(10px);border:1px solid var(--glass-border);cursor:pointer;font-size:18px;color:var(--text2)" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i></div>
  <div class="auth-brand">SEVEN</div>
  <div class="auth-sub">Create your account</div>
  <div class="auth-card">
    <div class="auth-dots" id="dots"><div class="auth-dot active"></div><div class="auth-dot"></div><div class="auth-dot"></div></div>

    <div class="auth-step active" id="s1">
      <div class="auth-step-title">What's your name?</div>
      <div class="input-group"><label class="input-label">Full Name</label><input type="text" class="input-field" id="regName" placeholder="Your name" autocomplete="name"></div>
      <button class="btn btn-primary btn-full" onclick="nextStep(2)">Continue</button>
    </div>

    <div class="auth-step" id="s2">
      <div class="auth-step-title">Set a password</div>
      <div class="input-group"><label class="input-label">Password</label><input type="password" class="input-field" id="regPwd" placeholder="At least 6 characters" autocomplete="new-password"></div>
      <div class="input-group"><label class="input-label">Confirm</label><input type="password" class="input-field" id="regCon" placeholder="Confirm password" autocomplete="new-password"></div>
      <button class="btn btn-primary btn-full" onclick="nextStep(3)">Continue</button>
      <button class="btn btn-ghost btn-full" onclick="prevStep(1)" style="margin-top:8px">Back</button>
    </div>

    <div class="auth-step" id="s3">
      <div class="auth-step-title">Profile picture</div>
      <div class="upload-wrap" onclick="document.getElementById('regUpload').click()">
        <img id="regPreview" src="" alt="" style="display:none">
        <div class="upload-placeholder" id="regPl"><span class="icon"><i class="fa-solid fa-camera"></i></span>Upload Photo</div>
      </div>
      <input type="file" id="regUpload" accept="image/*" style="display:none" onchange="previewRegPhoto(event)">
      <div style="text-align:center;font-size:12px;color:var(--text3);margin-bottom:16px">Optional</div>
      <button class="btn btn-success btn-full btn-lg" id="regBtn" onclick="handleRegister()"><span class="spinner spinner-sm" id="regSpin" style="display:none"></span><span id="regTxt">Create Account</span></button>
      <button class="btn btn-ghost btn-full" onclick="prevStep(2)" style="margin-top:8px">Back</button>
    </div>
  </div>
</div>
<script src="js/firebase.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script>
let regImg=null,step=1;
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('regName').addEventListener('keydown',e=>{if(e.key==='Enter')nextStep(2)});
  document.getElementById('regPwd').addEventListener('keydown',e=>{if(e.key==='Enter')nextStep(3)});
  document.getElementById('regCon').addEventListener('keydown',e=>{if(e.key==='Enter')nextStep(3)});
});
function nextStep(n){
  if(n===2&&!document.getElementById('regName').value.trim()){toast('Enter your name','error');return}
  if(n===3){
    const p=document.getElementById('regPwd').value,c=document.getElementById('regCon').value;
    if(!p||p.length<6){toast('Password must be 6+ characters','error');return}
    if(p!==c){toast('Passwords do not match','error');return}
  }
  document.querySelectorAll('.auth-step').forEach(s=>s.classList.remove('active'));
  document.getElementById('s'+n).classList.add('active');
  document.querySelectorAll('.auth-dot').forEach((d,i)=>{d.classList.toggle('active',i+1===n);d.classList.toggle('done',i+1<n)});
  step=n;
}
function prevStep(n){document.querySelectorAll('.auth-step').forEach(s=>s.classList.remove('active'));document.getElementById('s'+n).classList.add('active');document.querySelectorAll('.auth-dot').forEach((d,i)=>{d.classList.toggle('active',i+1===n);d.classList.toggle('done',i+1<n)});step=n}
function previewRegPhoto(e){
  const f=e.target.files[0];if(!f||f.size>5*1024*1024){toast('Image too large','error');return}
  regImg=f;const r=new FileReader();r.onload=ev=>{document.getElementById('regPreview').src=ev.target.result;document.getElementById('regPreview').style.display='block';document.getElementById('regPl').style.display='none'};r.readAsDataURL(f);
}
async function handleRegister(){
  const name=document.getElementById('regName').value.trim(),pwd=document.getElementById('regPwd').value;
  if(!name){toast('Enter your name','error');nextStep(1);return}
  if(!pwd){toast('Set a password','error');nextStep(2);return}
  const btn=document.getElementById('regBtn'),spin=document.getElementById('regSpin'),txt=document.getElementById('regTxt');
  btn.disabled=true;spin.style.display='inline-block';txt.textContent='Creating...';
  try{const id=await registerUser(name,pwd,regImg);if(id)goTo('home.html')}catch(e){btn.disabled=false;spin.style.display='none';txt.textContent='Create Account'}
}
</script>
</body>
</html>
