<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#0B1220">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%237C3AED'/%3E%3Cstop offset='100%25' stop-color='%238B5CF6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='96' cy='96' r='96' fill='url(%23g)'/%3E%3Cpath d='M38,75 Q96,49 154,75 Q157,82 154,90 Q96,128 38,90 Q35,82 38,75Z' fill='%230B1220'/%3E%3Cpath d='M49,81 Q96,60 143,81 L141,88 Q96,116 51,88Z' fill='%231E293B'/%3E%3Cellipse cx='71' cy='88' rx='6' ry='8' fill='%2306B6D4'/%3E%3Cellipse cx='121' cy='88' rx='6' ry='8' fill='%2306B6D4'/%3E%3Cellipse cx='71' cy='88' rx='2' ry='3' fill='%23fff'/%3E%3Cellipse cx='121' cy='88' rx='2' ry='3' fill='%23fff'/%3E%3Cpath d='M79,103 Q96,111 113,103' stroke='%2306B6D4' stroke-width='2' fill='none' stroke-linecap='round'/%3E%3Ctext x='96' y='145' font-size='16' font-weight='900' text-anchor='middle' fill='%23fff' font-family='Arial,Helvetica,sans-serif' letter-spacing='2'%3ESEVEN%3C/text%3E%3C/svg%3E" sizes="192x192">
<title>SEVEN - Register</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="css/style.css">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
</head>
<body class="bg-[#0B1220] flex flex-column align-items-center justify-content-center min-vh-100 p-3" style="font-family:'Inter',sans-serif">
<div class="position-fixed top-0 start-0 z-3 m-2">
  <button class="btn btn-outline-light rounded-circle d-flex align-items-center justify-content-center" style="width:38px;height:38px" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i></button>
</div>
<div class="text-center mb-2">
  <div class="auth-brand">SEVEN</div>
  <div class="text-secondary-emphasis" style="font-size:14px">Create your account</div>
</div>
<div class="card border-0 shadow" style="width:100%;max-width:380px;background:var(--glass);backdrop-filter:blur(40px);border-radius:20px;border:1px solid var(--glass-border)">
  <div class="card-body p-4">
    <div class="d-flex gap-2 justify-content-center mb-3">
      <div class="auth-dot active"></div><div class="auth-dot"></div><div class="auth-dot"></div>
    </div>

    <div class="auth-step active" id="s1">
      <h4 class="text-center fw-bold mb-4 text-white">What's your name?</h4>
      <div class="mb-3">
        <label class="form-label text-uppercase text-secondary-emphasis small fw-semibold">Full Name</label>
        <input type="text" class="form-control bg-[#172033] border-secondary text-white" id="regName" placeholder="Your name" autocomplete="name" style="border-radius:16px;padding:14px 16px">
      </div>
      <button class="btn w-100 text-white fw-semibold border-0" style="background:#7C3AED;border-radius:18px;padding:13px" onclick="nextStep(2)">Continue</button>
    </div>

    <div class="auth-step" id="s2">
      <h4 class="text-center fw-bold mb-4 text-white">Set a password</h4>
      <div class="mb-3">
        <label class="form-label text-uppercase text-secondary-emphasis small fw-semibold">Password</label>
        <input type="password" class="form-control bg-[#172033] border-secondary text-white" id="regPwd" placeholder="At least 6 characters" autocomplete="new-password" style="border-radius:16px;padding:14px 16px">
      </div>
      <div class="mb-3">
        <label class="form-label text-uppercase text-secondary-emphasis small fw-semibold">Confirm</label>
        <input type="password" class="form-control bg-[#172033] border-secondary text-white" id="regCon" placeholder="Confirm password" autocomplete="new-password" style="border-radius:16px;padding:14px 16px">
      </div>
      <button class="btn w-100 text-white fw-semibold border-0" style="background:#7C3AED;border-radius:18px;padding:13px" onclick="nextStep(3)">Continue</button>
      <button class="btn w-100 mt-2 border-secondary text-secondary-emphasis fw-semibold" style="border-radius:18px;padding:13px" onclick="prevStep(1)">Back</button>
    </div>

    <div class="auth-step" id="s3">
      <h4 class="text-center fw-bold mb-4 text-white">Profile picture</h4>
      <div class="upload-wrap mx-auto" onclick="document.getElementById('regUpload').click()">
        <img id="regPreview" src="" alt="" class="d-none w-100 h-100 object-fit-cover">
        <div class="upload-placeholder" id="regPl"><span class="d-block fs-1 mb-1"><i class="fa-solid fa-camera"></i></span>Upload Photo</div>
      </div>
      <input type="file" id="regUpload" accept="image/*" class="d-none" onchange="previewRegPhoto(event)">
      <p class="text-center text-secondary-emphasis small mb-3">Optional</p>
      <button class="btn w-100 btn-lg text-white fw-semibold border-0" id="regBtn" onclick="handleRegister()" style="background:#22C55E;border-radius:18px;padding:15px">
        <span class="spinner-border spinner-border-sm d-none" id="regSpin" role="status"></span>
        <span id="regTxt">Create Account</span>
      </button>
      <button class="btn w-100 mt-2 border-secondary text-secondary-emphasis fw-semibold" style="border-radius:18px;padding:13px" onclick="prevStep(2)">Back</button>
    </div>
  </div>
</div>
<script src="js/firebase.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script>
let regImg=null,step=1;
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('regName').addEventListener('keydown',e=>{if(e.key==='Enter')nextStep(2)});
  document.getElementById('regPwd').addEventListener('keydown',e=>{if(e.key==='Enter')nextStep(3)});
  document.getElementById('regCon').addEventListener('keydown',e=>{if(e.key==='Enter')nextStep(3)});
});
function nextStep(n){
  if(n===2&&!document.getElementById('regName').value.trim()){toast('Enter your name','error');return}
  if(n===3){
    const p=document.getElementById('regPwd').value,c=document.getElementById('regCon').value;
    if(!p||p.length<6){toast('Password must be 6+ characters','error');return}
    if(p!==c){toast('Passwords do not match','error');return}
  }
  document.querySelectorAll('.auth-step').forEach(s=>s.classList.remove('active'));
  document.getElementById('s'+n).classList.add('active');
  document.querySelectorAll('.auth-dot').forEach((d,i)=>{d.classList.toggle('active',i+1===n);d.classList.toggle('done',i+1<n)});
  step=n;
}
function prevStep(n){document.querySelectorAll('.auth-step').forEach(s=>s.classList.remove('active'));document.getElementById('s'+n).classList.add('active');document.querySelectorAll('.auth-dot').forEach((d,i)=>{d.classList.toggle('active',i+1===n);d.classList.toggle('done',i+1<n)});step=n}
function previewRegPhoto(e){
  const f=e.target.files[0];if(!f||f.size>5*1024*1024){toast('Image too large','error');return}
  regImg=f;const r=new FileReader();r.onload=ev=>{document.getElementById('regPreview').src=ev.target.result;document.getElementById('regPreview').classList.remove('d-none');document.getElementById('regPl').classList.add('d-none')};r.readAsDataURL(f);
}
async function handleRegister(){
  const name=document.getElementById('regName').value.trim(),pwd=document.getElementById('regPwd').value;
  if(!name){toast('Enter your name','error');nextStep(1);return}
  if(!pwd){toast('Set a password','error');nextStep(2);return}
  const btn=document.getElementById('regBtn'),spin=document.getElementById('regSpin'),txt=document.getElementById('regTxt');
  btn.disabled=true;spin.classList.remove('d-none');txt.textContent='Creating...';
  try{const id=await registerUser(name,pwd,regImg);if(id)goTo('home.html')}catch(e){btn.disabled=false;spin.classList.add('d-none');txt.textContent='Create Account'}
}
</script>
</body>
</html>
