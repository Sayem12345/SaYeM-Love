<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#0B141A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>SEVEN - Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Poppins:wght@400;500;600;700;800&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/mobile.css">
<link rel="stylesheet" href="css/dark.css">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
</head>
<body>
<div class="topbar">
  <button class="topbar-btn" onclick="goTo('home.html')"><i class="fa-solid fa-arrow-left"></i></button>
  <div class="topbar-center"><div class="topbar-title">Profile</div></div>
  <button class="topbar-btn" onclick="goTo('settings.html')"><i class="fa-solid fa-gear"></i></button>
</div>
<div style="flex:1;overflow-y:auto">
  <div style="padding:24px 16px;text-align:center">
    <div style="position:relative;cursor:pointer;display:inline-block" onclick="document.getElementById('pfpUpload').click()">
      <img id="pfpImg" src="" class="avatar avatar-xxl" alt="" style="display:none">
      <div id="pfpPl" class="avatar avatar-xxl avatar-placeholder" style="font-size:44px">?</div>
      <div style="position:absolute;bottom:4px;right:4px;width:30px;height:30px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;border:2px solid var(--bg)"><i class="fa-solid fa-camera"></i></div>
    </div>
    <div style="font-size:22px;font-weight:800;margin-top:10px" id="pfpName">User</div>
    <div style="font-size:13px;color:var(--text3);margin-top:3px" id="pfpUser">@user</div>
    <div style="font-size:14px;color:var(--text2);margin-top:8px;line-height:1.5" id="pfpBio">No bio yet</div>
  </div>
  <div style="display:flex;gap:28px;padding:14px 0;justify-content:center;border-top:1px solid var(--glass-border);border-bottom:1px solid var(--glass-border);margin:0 16px">
    <div style="text-align:center"><div style="font-size:19px;font-weight:800;color:var(--primary)" id="pfpChats">0</div><div style="font-size:12px;color:var(--text3)">Chats</div></div>
    <div style="text-align:center"><div style="font-size:19px;font-weight:800;color:var(--primary)" id="pfpDays">0</div><div style="font-size:12px;color:var(--text3)">Days</div></div>
  </div>
  <div style="padding:12px 16px">
    <button class="btn btn-ghost btn-full" onclick="document.getElementById('bioEdit').style.display='block';this.style.display='none'"><i class="fa-solid fa-pen"></i> Edit Bio</button>
    <div id="bioEdit" style="display:none;margin-top:8px">
      <div class="input-group"><input type="text" class="input-field" id="bioInput" placeholder="Write your bio..." maxlength="100"></div>
      <button class="btn btn-sm btn-primary btn-full" onclick="saveBio()">Save</button>
    </div>
  </div>
</div>
<input type="file" id="pfpUpload" accept="image/*" style="display:none" onchange="changePfp(event)">
<script src="js/firebase.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script src="js/profile.js"></script>
<script>
document.addEventListener('DOMContentLoaded',()=>{
  if(!isLoggedIn()){goTo('login.html');return}
  const uid=localStorage.getItem('uid');
  REFS.users.child(uid).once('value',snap=>{
    const u=snap.val();if(!u)return;
    const img=document.getElementById('pfpImg'),pl=document.getElementById('pfpPl');
    if(u.profileImage){img.src=u.profileImage;img.style.display='block';pl.style.display='none'}else{img.style.display='none';pl.style.display='flex';pl.textContent=u.name[0]}
    document.getElementById('pfpName').textContent=u.name;document.getElementById('pfpUser').textContent='@'+(u.userId||'').slice(-6);
    document.getElementById('pfpBio').textContent=u.bio||'No bio yet';
    document.getElementById('pfpDays').textContent=Math.floor((Date.now()-(u.createdAt||Date.now()))/86400000)||1;
    REFS.chats.once('value',s=>{let c=0;s.forEach(ch=>{if(ch.val().participants&&ch.val().participants[uid])c++});document.getElementById('pfpChats').textContent=c-1||0});
  });
});
async function saveBio(){
  const b=document.getElementById('bioInput').value.trim();if(!b){toast('Enter a bio','error');return}
  await updateProfile({bio});document.getElementById('pfpBio').textContent=b;document.getElementById('bioEdit').style.display='none';document.querySelector('.btn-ghost').style.display='flex';toast('Bio saved','success');
}
async function changePfp(e){
  const f=e.target.files[0];if(!f||f.size>5*1024*1024){toast('Image too large','error');return}
  const url=await updateProfileImage(f);if(url){document.getElementById('pfpImg').src=url;document.getElementById('pfpImg').style.display='block';document.getElementById('pfpPl').style.display='none'}
}
</script>
</body>
</html>
