<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#0B1220">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%237C3AED'/%3E%3Cstop offset='100%25' stop-color='%238B5CF6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='96' cy='96' r='96' fill='url(%23g)'/%3E%3Cpath d='M38,75 Q96,49 154,75 Q157,82 154,90 Q96,128 38,90 Q35,82 38,75Z' fill='%230B1220'/%3E%3Cpath d='M49,81 Q96,60 143,81 L141,88 Q96,116 51,88Z' fill='%231E293B'/%3E%3Cellipse cx='71' cy='88' rx='6' ry='8' fill='%2306B6D4'/%3E%3Cellipse cx='121' cy='88' rx='6' ry='8' fill='%2306B6D4'/%3E%3Cellipse cx='71' cy='88' rx='2' ry='3' fill='%23fff'/%3E%3Cellipse cx='121' cy='88' rx='2' ry='3' fill='%23fff'/%3E%3Cpath d='M79,103 Q96,111 113,103' stroke='%2306B6D4' stroke-width='2' fill='none' stroke-linecap='round'/%3E%3Ctext x='96' y='145' font-size='16' font-weight='900' text-anchor='middle' fill='%23fff' font-family='Arial,Helvetica,sans-serif' letter-spacing='2'%3ESEVEN%3C/text%3E%3C/svg%3E" sizes="192x192">
<title>SEVEN - Chats</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="css/style.css">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-messaging.js"></script>
</head>
<body>
<div class="d-flex flex-column h-100 w-100">
  <div class="topbar">
    <div class="topbar-brand">SEVEN</div>
    <div class="flex-grow-1"></div>
    <button class="topbar-btn" onclick="goTo('search.html')"><i class="fa-solid fa-magnifying-glass"></i></button>
    <button class="topbar-btn" onclick="goTo('profile.html')"><i class="fa-solid fa-user"></i></button>
  </div>

  <div id="archiveToggle" class="archive-toggle d-none" onclick="toggleArchiveSection()"><i class="fa-solid fa-box-archive"></i> <span>Archived chats</span> <span id="archiveCount" class="text-secondary-emphasis" style="font-size:13px;margin-left:4px"></span> <span class="ms-auto" style="font-size:11px"><i class="fa-solid fa-chevron-down"></i></span></div>
  <div id="archivedSection" class="d-none"><div class="chat-list" id="archivedList"></div></div>
  <div id="chatsList" class="chat-list"></div>
  <div id="chatsEmpty" class="empty d-none">
    <div class="empty-icon"><i class="fa-regular fa-comment-dots"></i></div>
    <div class="empty-title">No chats yet</div>
    <div class="empty-desc">Start a conversation with someone</div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-tabs">
    <button class="bottom-tab active" onclick="goTo('home.html')"><span class="bottom-tab-icon"><i class="fa-regular fa-comment-dots"></i></span><span>Chats</span></button>
    <button class="bottom-tab" onclick="goTo('active.html')"><span class="bottom-tab-icon"><i class="fa-solid fa-circle" style="color:#10B981;font-size:14px"></i></span><span>Active</span></button>
    <button class="bottom-tab" onclick="goTo('search.html')"><span class="bottom-tab-icon"><i class="fa-solid fa-magnifying-glass"></i></span><span>Search</span></button>
    <button class="bottom-tab" onclick="goTo('profile.html')"><span class="bottom-tab-icon"><i class="fa-solid fa-user"></i></span><span>Profile</span></button>
    <button class="bottom-tab" onclick="goTo('settings.html')"><span class="bottom-tab-icon"><i class="fa-solid fa-gear"></i></span><span>Settings</span></button>
  </div>

  <div class="fab" onclick="showNewChat()"><i class="fa-solid fa-pen"></i></div>

  <!-- NEW CHAT MODAL -->
  <div class="modal-overlay" id="newChatModal">
    <div class="modal">
      <div class="modal-title">New Chat</div>
      <div class="d-flex align-items-center gap-2 bg-[#172033] rounded-4 px-3 mb-2" style="border:1px solid var(--glass-border)">
        <i class="fa-solid fa-magnifying-glass text-secondary-emphasis" style="font-size:14px"></i>
        <input type="text" id="newChatSearch" placeholder="Search users..." class="flex-grow-1 bg-transparent text-white border-0 py-2" style="outline:none;font-size:15px" oninput="searchUsersNewChat(this.value)">
      </div>
      <div id="newChatResults" style="max-height:260px;overflow-y:auto"></div>
      <button class="btn w-100 border-secondary text-secondary-emphasis fw-semibold mt-2" style="border-radius:18px;padding:13px" onclick="closeModal('newChatModal')">Cancel</button>
    </div>
  </div>

  <!-- PASSWORD MODAL -->
  <div class="modal-overlay" id="pwdModal">
    <div class="modal">
      <div class="modal-title">Change Password</div>
      <div class="mb-3"><label class="form-label text-uppercase text-secondary-emphasis small fw-semibold">Current</label><input type="password" class="form-control bg-[#172033] border-secondary text-white" id="curPwd" placeholder="Current password" style="border-radius:16px;padding:14px 16px"></div>
      <div class="mb-3"><label class="form-label text-uppercase text-secondary-emphasis small fw-semibold">New</label><input type="password" class="form-control bg-[#172033] border-secondary text-white" id="newPwd" placeholder="New password" style="border-radius:16px;padding:14px 16px"></div>
      <div class="mb-3"><label class="form-label text-uppercase text-secondary-emphasis small fw-semibold">Confirm</label><input type="password" class="form-control bg-[#172033] border-secondary text-white" id="conPwd" placeholder="Confirm password" style="border-radius:16px;padding:14px 16px"></div>
      <button class="btn w-100 text-white fw-semibold border-0" style="background:#7C3AED;border-radius:18px;padding:13px" onclick="savePwd()">Save</button>
      <button class="btn w-100 mt-2 border-secondary text-secondary-emphasis fw-semibold" style="border-radius:18px;padding:13px" onclick="closeModal('pwdModal')">Cancel</button>
    </div>
  </div>

  <!-- GITHUB TOKEN MODAL -->
  <div class="modal-overlay" id="gtModal">
    <div class="modal">
      <div class="modal-title">GitHub Token</div>
      <p class="text-secondary-emphasis text-center small mb-3">Required for image uploads via GitHub API</p>
      <div class="mb-3"><label class="form-label text-uppercase text-secondary-emphasis small fw-semibold">Personal Access Token</label><input type="text" class="form-control bg-[#172033] border-secondary text-white" id="gtInput" placeholder="ghp_..." style="border-radius:16px;padding:14px 16px" autocomplete="off"></div>
      <button class="btn w-100 text-white fw-semibold border-0" style="background:#7C3AED;border-radius:18px;padding:13px" onclick="saveGitToken()">Save</button>
      <button class="btn w-100 mt-2 border-secondary text-secondary-emphasis fw-semibold" style="border-radius:18px;padding:13px" onclick="closeModal('gtModal')">Cancel</button>
    </div>
  </div>

  <input type="file" id="profileUpload" accept="image/*" class="d-none" onchange="changeHomePfp(event)">
</div>

<script src="js/firebase.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script src="js/chat.js"></script>
<script src="js/search.js"></script>
<script src="js/notifications.js"></script>
<script>
let unsubChats=null, unsubActive=null, unsubUnread=null;
let _allChats=[], _allArchived=[];

function initHome(){
  if(!isLoggedIn()){goTo('login.html');return}
  initPresence();
  initNotifications();
  loadChatList();
  loadUnread();
  if(localStorage.getItem('anim')==='off')document.body.classList.add('no-anim');
}
(function(){if(document.readyState!=='loading')initHome();else document.addEventListener('DOMContentLoaded',initHome)})();

function loadChatList(){
  if(unsubChats)unsubChats();
  unsubChats=listenChatList((chats,archived)=>{
    _allChats=chats;_allArchived=archived;
    renderChats();
    renderArchived();
  });
}
function renderChats(){
  const c=document.getElementById('chatsList');
  const e=document.getElementById('chatsEmpty');
  c.innerHTML='';
  if(!_allChats.length){c.style.display='none';e.classList.remove('d-none');return}
  c.style.display='block';e.classList.add('d-none');
  _allChats.forEach(chat=>c.appendChild(createChatItem(chat,false)));
}
function createChatItem(chat,isArchived){
  const d=document.createElement('div');
  d.className='chat-item'+(chat.pinned?' pinned':'');
  const my=uid();
  const avatar=chat.partnerImage?`<img class="avatar" src="${chat.partnerImage}" alt="">`:`<div class="avatar avatar-placeholder" style="font-size:18px">${(chat.partnerName||'?')[0]}</div>`;
  const unread=chat._unread>0?`<span class="unread-badge-sm">${chat._unread>99?'99+':chat._unread}</span>`:'';
  d.innerHTML=`
    ${chat.pinned?'<div class="chat-pin-icon"><i class="fa-solid fa-thumbtack"></i></div>':''}
    <div style="position:relative;flex-shrink:0">${avatar}${chat.partnerOnline?'<div class="online-dot"></div>':''}${unread}</div>
    <div class="chat-item-info">
      <div class="chat-item-name">${escapeHtml(chat.partnerName)}</div>
      <div class="chat-item-preview">${chat.lastSender===my?'You: ':''}${escapeHtml(chat.lastMessage||'Start chatting')}</div>
    </div>
    <div class="chat-item-right">
      <div class="chat-item-time">${chat.lastTime?formatTime(chat.lastTime):''}</div>
    </div>`;
  d.onclick=()=>goTo('chat.html?id='+chat.id+'&partner='+chat.partnerId);
  let lt;
  d.addEventListener('mousedown',()=>{lt=setTimeout(()=>showChatContext(chat.id,chat.partnerName,isArchived),400)});
  d.addEventListener('mouseup',()=>clearTimeout(lt));d.addEventListener('mouseleave',()=>clearTimeout(lt));
  d.addEventListener('touchstart',()=>{lt=setTimeout(()=>showChatContext(chat.id,chat.partnerName,isArchived),400)});
  d.addEventListener('touchend',()=>clearTimeout(lt));
  return d;
}
function renderArchived(){
  const sec=document.getElementById('archivedSection');
  const tog=document.getElementById('archiveToggle');
  if(!_allArchived.length){sec.classList.add('d-none');tog.classList.add('d-none');return}
  tog.classList.remove('d-none');
  document.getElementById('archiveCount').textContent='('+_allArchived.length+')';
  const l=document.getElementById('archivedList');l.innerHTML='';
  _allArchived.forEach(chat=>l.appendChild(createChatItem(chat,true)));
}
function toggleArchiveSection(){
  const s=document.getElementById('archivedSection');
  s.classList.toggle('d-none');
}
function showChatContext(chatId,partnerName,isArchived){
  const ov=document.createElement('div');ov.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;z-index:199;background:rgba(0,0,0,.3)';ov.onclick=()=>{menu.remove();ov.remove()};
  const menu=document.createElement('div');menu.style.cssText='position:fixed;bottom:0;left:0;right:0;background:#111827;border-radius:14px 14px 0 0;z-index:200;padding:14px;border-top:1px solid var(--glass-border)';
  let btns='';
  if(isArchived)btns+=`<button class="btn w-100 border-0 d-flex justify-content-start gap-3 py-3" style="color:var(--text2)" onclick="closeCtxMenu();toggleArchiveChat('${chatId}',false)"><i class="fa-solid fa-box-archive"></i> Unarchive</button>`;
  else{
    btns+=`<button class="btn w-100 border-0 d-flex justify-content-start gap-3 py-3" style="color:var(--text2)" onclick="closeCtxMenu();togglePinChat('${chatId}')"><i class="fa-solid fa-thumbtack"></i> Toggle Pin</button>`;
    btns+=`<button class="btn w-100 border-0 d-flex justify-content-start gap-3 py-3" style="color:var(--text2)" onclick="closeCtxMenu();toggleArchiveChat('${chatId}',true)"><i class="fa-solid fa-box-archive"></i> Archive</button>`;
  }
  btns+=`<button class="btn w-100 border-0 d-flex justify-content-start gap-3 py-3 text-danger" onclick="closeCtxMenu();deleteChatConfirm('${chatId}')"><i class="fa-solid fa-trash-can"></i> Delete Chat</button>`;
  btns+=`<button class="btn w-100 border-0 d-flex justify-content-start gap-3 py-3" style="color:var(--text2)" onclick="closeCtxMenu()">Cancel</button>`;
  menu.innerHTML=btns;document.body.appendChild(ov);document.body.appendChild(menu);
  window.closeCtxMenu=()=>{menu.remove();ov.remove()};
}
async function deleteChatConfirm(chatId){
  if(!confirm('Delete this conversation?'))return;
  try{await REFS.messages.child(chatId).remove();await REFS.chats.child(chatId).update({lastMessage:'',lastTime:0,archived:false});toast('Chat deleted','success')}
  catch(e){toast('Error','error')}
}

// UNREAD
function loadUnread(){
  if(unsubUnread)unsubUnread();
  listenUnreadCount(c=>{
    const badge=document.querySelector('.bottom-tab.active .unread-badge');
    if(c>0){
      if(!badge){const b=document.createElement('span');b.className='unread-badge';const tab=document.querySelector('.bottom-tab.active');if(tab){b.textContent=c>99?'99+':c;tab.style.position='relative';tab.appendChild(b)}}
      else{badge.textContent=c>99?'99+':c}
    }else if(badge)badge.remove();
  });
}

// NEW CHAT
function showNewChat(){
  document.getElementById('newChatModal').classList.add('active');
  document.getElementById('newChatSearch').value='';
  document.getElementById('newChatResults').innerHTML='<div style="text-align:center;padding:20px;color:var(--text3);font-size:14px">Search for users</div>';
  document.getElementById('newChatSearch').focus();
}
function searchUsersNewChat(q){
  searchUsers(q,users=>{
    const c=document.getElementById('newChatResults');c.innerHTML='';
    if(!users.length||!q){if(!q)c.innerHTML='<div style="text-align:center;padding:20px;color:var(--text3);font-size:14px">Search for users</div>';return}
    users.forEach(u=>{
      const d=document.createElement('div');d.className='user-row';
      d.innerHTML=`${u.profileImage?`<img class="avatar avatar-sm" src="${u.profileImage}" alt="">`:`<div class="avatar avatar-sm avatar-placeholder" style="font-size:13px">${u.name[0]}</div>`}<div style="flex:1;font-weight:500;font-size:14px">${escapeHtml(u.name)}</div>`;
      d.onclick=async()=>{closeModal('newChatModal');const id=await getOrCreateChat(u.id);if(id)goTo('chat.html?id='+id+'&partner='+u.id)};
      c.appendChild(d);
    });
  });
}

// PASSWORD
function changePwd(){document.getElementById('pwdModal').classList.add('active')}
async function savePwd(){
  const cur=document.getElementById('curPwd').value,n=document.getElementById('newPwd').value,c=document.getElementById('conPwd').value;
  if(!cur||!n||!c){toast('Fill all fields','error');return}
  if(n.length<6){toast('6+ characters','error');return}
  if(n!==c){toast('Passwords do not match','error');return}
  const uid=localStorage.getItem('uid');
  const snap=await REFS.users.child(uid).once('value');const user=snap.val();
  if(!user){toast('User not found','error');return}
  if(await sha256(cur)!==user.passwordHash){toast('Wrong password','error');return}
  await REFS.users.child(uid).update({passwordHash:await sha256(n)});
  toast('Password changed','success');closeModal('pwdModal');
  document.getElementById('curPwd').value='';document.getElementById('newPwd').value='';document.getElementById('conPwd').value='';
}

// GITHUB TOKEN
function showGitToken(){document.getElementById('gtInput').value=localStorage.getItem('gt')||'';document.getElementById('gtModal').classList.add('active')}
function saveGitToken(){const v=document.getElementById('gtInput').value.trim();if(!v||!v.startsWith('ghp_')){toast('Invalid token','error');return}localStorage.setItem('gt',v);window.__GT=v;closeModal('gtModal');toast('Token saved','success')}
function closeModal(id){document.getElementById(id).classList.remove('active')}

// PFP UPLOAD
async function changeHomePfp(e){
  const f=e.target.files[0];if(!f||f.size>5*1024*1024){toast('Image too large','error');return}
  const url=await updateProfileImage(f);
  if(url){toast('Photo updated','success')}
}
</script>
</body>
</html>
