<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#0F172A">
<link rel="manifest" href="manifest.json">
<title>SEVEN - Chats</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/mobile.css">
<link rel="stylesheet" href="css/dark.css">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-messaging.js"></script>
</head>
<body>
<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-brand">SEVEN</div>
  <div style="flex:1"></div>
  <button class="topbar-btn" onclick="switchTab('search')" title="Search">🔍</button>
  <button class="topbar-btn" onclick="goTo('profile.html')" title="Profile">👤</button>
</div>

<!-- TABS -->
<div style="display:flex;border-bottom:1px solid var(--glass-border,#ffffff14);flex-shrink:0">
  <button class="tab-btn active" id="tabChats" onclick="switchTab('chats')" style="flex:1;padding:14px;font-weight:600;font-size:14px;background:transparent;color:var(--text2,#94A3B8);border:none;border-bottom:2px solid transparent;transition:all 0.3s ease;position:relative">
    Chats <span id="unreadBadge" style="display:none;position:absolute;top:8px;right:8px;min-width:18px;height:18px;border-radius:9px;background:#3B82F6;color:#fff;font-size:10px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;padding:0 5px"></span>
  </button>
  <button class="tab-btn" id="tabActive" onclick="switchTab('active')" style="flex:1;padding:14px;font-weight:600;font-size:14px;background:transparent;color:var(--text2,#94A3B8);border:none;border-bottom:2px solid transparent;transition:all 0.3s ease">
    Active
  </button>
  <button class="tab-btn" id="tabSearch" onclick="switchTab('search')" style="flex:1;padding:14px;font-weight:600;font-size:14px;background:transparent;color:var(--text2,#94A3B8);border:none;border-bottom:2px solid transparent;transition:all 0.3s ease">
    Search
  </button>
</div>

<!-- TAB CONTENT: CHATS -->
<div class="tab-content active" id="contentChats" style="flex:1;display:flex;flex-direction:column;overflow:hidden">
  <div id="chatsList" class="chat-list"></div>
  <div id="chatsEmpty" class="empty-state" style="display:none">
    <div class="empty-state-icon">💬</div>
    <div class="empty-state-title">No chats yet</div>
    <div class="empty-state-desc">Start a new conversation with someone</div>
  </div>
</div>

<!-- TAB CONTENT: ACTIVE -->
<div class="tab-content" id="contentActive" style="flex:1;display:none;flex-direction:column;overflow:hidden">
  <div id="activeUsers" class="users-grid"></div>
  <div id="activeEmpty" class="empty-state" style="display:none">
    <div class="empty-state-icon">🟢</div>
    <div class="empty-state-title">No active users</div>
    <div class="empty-state-desc">No one is online right now</div>
  </div>
</div>

<!-- TAB CONTENT: SEARCH -->
<div class="tab-content" id="contentSearch" style="flex:1;display:none;flex-direction:column;overflow:hidden">
  <div style="padding:12px 16px">
    <div class="input-group" style="margin:0">
      <input type="text" class="input-field" id="searchInput" placeholder="Search users by name..." oninput="handleSearch(this.value)">
    </div>
  </div>
  <div id="searchResults" class="users-grid"></div>
  <div id="searchEmpty" class="empty-state" style="display:none">
    <div class="empty-state-icon">🔍</div>
    <div class="empty-state-title">Search users</div>
    <div class="empty-state-desc">Find people by their display name</div>
  </div>
</div>

<!-- FAB -->
<div class="fab" onclick="showNewChatModal()">✏️</div>

<!-- NEW CHAT MODAL -->
<div class="modal-overlay" id="newChatModal">
  <div class="modal" style="position:relative">
    <div class="modal-title">New Chat</div>
    <div class="input-group">
      <input type="text" class="input-field" id="newChatSearch" placeholder="Search users..." oninput="searchUsersForNewChat(this.value)">
    </div>
    <div id="newChatResults" style="max-height:300px;overflow-y:auto;margin-top:8px"></div>
    <button class="btn btn-ghost btn-full" onclick="closeModal('newChatModal')" style="margin-top:12px">Cancel</button>
  </div>
</div>

<script src="js/firebase.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script src="js/chat.js"></script>
<script src="js/search.js"></script>
<script src="js/notifications.js"></script>

<style>
.tab-btn.active{color:var(--primary,#3B82F6)!important;border-bottom-color:var(--primary,#3B82F6)!important}
.tab-content.active{display:flex!important}
</style>

<script>
let activeTab='chats';
let chatListUnsub=null;
let onlineUsersUnsub=null;
let unreadUnsub=null;

document.addEventListener('DOMContentLoaded',()=>{
  if(!isLoggedIn()){goTo('login.html');return}
  initPresence();
  initNotifications();

  // Tab styles
  document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.addEventListener('click',function(){
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      this.classList.add('active');
    });
  });

  // Load chats
  chatListUnsub=listenChatList(chats=>{
    const container=document.getElementById('chatsList');
    const empty=document.getElementById('chatsEmpty');
    container.innerHTML='';
    if(!chats.length){container.style.display='none';empty.style.display='flex';return}
    container.style.display='block';empty.style.display='none';
    chats.forEach(chat=>{
      const div=document.createElement('div');
      div.className='chat-item';
      div.innerHTML=`
        <div class="avatar-wrap">
          ${chat.partnerImage
            ? `<img class="avatar" src="${chat.partnerImage}" alt="" onerror="this.src=''">`
            : `<div class="avatar avatar avatar-placeholder" style="font-size:18px">${chat.partnerName.charAt(0).toUpperCase()}</div>`
          }
          ${chat.partnerOnline?'<div class="online-dot"></div>':''}
        </div>
        <div class="chat-item-info">
          <div class="chat-item-name">${escapeHtml(chat.partnerName)}</div>
          <div class="chat-item-preview">${chat.lastSender===uid()?'You: ':''}${escapeHtml(chat.lastMessage||'Start chatting')}</div>
        </div>
        <div class="chat-item-meta">
          <div class="chat-item-time">${formatTime(chat.lastTime)}</div>
        </div>
      `;
      div.onclick=()=>goTo('chat.html?id='+chat.id+'&partner='+chat.partnerId);
      container.appendChild(div);
    });
  });

  // Load online users
  listenOnlineUsers(users=>{
    const container=document.getElementById('activeUsers');
    const empty=document.getElementById('activeEmpty');
    container.innerHTML='';
    if(!users.length){container.style.display='none';empty.style.display='flex';return}
    container.style.display='block';empty.style.display='none';
    users.forEach(u=>{
      const div=document.createElement('div');
      div.className='user-card online';
      div.innerHTML=`
        ${u.profileImage
          ? `<img class="avatar" src="${u.profileImage}" alt="">`
          : `<div class="avatar avatar-placeholder" style="font-size:18px">${u.name.charAt(0).toUpperCase()}</div>`
        }
        <div class="user-card-info">
          <div class="user-card-name">${escapeHtml(u.name)}</div>
          <div class="user-card-status online">Online</div>
        </div>
      `;
      div.onclick=async()=>{
        const chatId=await getOrCreateChat(u.id);
        if(chatId)goTo('chat.html?id='+chatId+'&partner='+u.id);
      };
      container.appendChild(div);
    });
  });

  // Unread count
  listenUnreadCount(count=>{
    const badge=document.getElementById('unreadBadge');
    if(count>0){badge.textContent=count>99?'99+':count;badge.style.display='inline-flex'}
    else badge.style.display='none';
  });
});

function switchTab(tab){
  activeTab=tab;
  document.querySelectorAll('.tab-content').forEach(c=>c.style.display='none');
  document.getElementById('content'+tab.charAt(0).toUpperCase()+tab.slice(1)).style.display='flex';
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add('active');
}

let searchTimeout=null;
function handleSearch(q){
  clearTimeout(searchTimeout);
  searchTimeout=setTimeout(()=>{
    searchUsers(q,users=>{
      const container=document.getElementById('searchResults');
      const empty=document.getElementById('searchEmpty');
      container.innerHTML='';
      if(!users.length||!q){container.style.display='none';empty.style.display=q?'flex':'none';return}
      container.style.display='block';empty.style.display='none';
      users.forEach(u=>{
        const div=document.createElement('div');
        div.className='user-card';
        div.innerHTML=`
          ${u.profileImage
            ? `<img class="avatar" src="${u.profileImage}" alt="">`
            : `<div class="avatar avatar-placeholder" style="font-size:18px">${u.name.charAt(0).toUpperCase()}</div>`
          }
          <div class="user-card-info">
            <div class="user-card-name">${escapeHtml(u.name)}</div>
          </div>
          <button class="btn btn-sm btn-primary" onclick="event.stopPropagation();startChat('${u.id}')">Chat</button>
        `;
        div.onclick=()=>startChat(u.id);
        container.appendChild(div);
      });
    });
  },300);
}

async function startChat(partnerId){
  const chatId=await getOrCreateChat(partnerId);
  if(chatId)goTo('chat.html?id='+chatId+'&partner='+partnerId);
}

function showNewChatModal(){
  document.getElementById('newChatModal').classList.add('active');
  document.getElementById('newChatSearch').value='';
  document.getElementById('newChatResults').innerHTML='';
  document.getElementById('newChatSearch').focus();
}

function closeModal(id){
  document.getElementById(id).classList.remove('active');
}

function searchUsersForNewChat(q){
  searchUsers(q,users=>{
    const container=document.getElementById('newChatResults');
    container.innerHTML='';
    if(!users.length||!q){
      if(!q)container.innerHTML='<div style="text-align:center;padding:20px;color:#64748B;font-size:14px">Search for users to chat with</div>';
      return
    }
    users.forEach(u=>{
      const div=document.createElement('div');
      div.className='search-result-item';
      div.innerHTML=`
        ${u.profileImage
          ? `<img class="avatar avatar-sm" src="${u.profileImage}" alt="">`
          : `<div class="avatar avatar-sm avatar-placeholder" style="font-size:14px">${u.name.charAt(0).toUpperCase()}</div>`
        }
        <div style="flex:1;font-weight:500;font-size:14px">${escapeHtml(u.name)}</div>
      `;
      div.onclick=async()=>{
        closeModal('newChatModal');
        const chatId=await getOrCreateChat(u.id);
        if(chatId)goTo('chat.html?id='+chatId+'&partner='+u.id);
      };
      container.appendChild(div);
    });
  });
}
</script>
</body>
</html>
