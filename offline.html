<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - SEVEN</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0f;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh}
    .box{text-align:center;padding:2rem}
    .box i{font-size:4rem;color:#e91e63;margin-bottom:1.5rem}
    h1{font-size:1.8rem;margin-bottom:.5rem}
    p{color:#888;margin-bottom:2rem}
    .retry{background:linear-gradient(135deg,#e91e63,#9c27b0);color:#fff;border:none;padding:.8rem 2rem;border-radius:25px;font-size:1rem;cursor:pointer}
    .retry:hover{opacity:.9}
  </style>
</head>
<body>
  <div class="box">
    <i class="fas fa-wifi-slash"></i>
    <h1>You're Offline</h1>
    <p>Please check your connection</p>
    <button class="retry" onclick="location.reload()"><i class="fas fa-sync-alt"></i> Try Again</button>
  </div>
</body>
</html>
