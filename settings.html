<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#0F172A">
<link rel="manifest" href="manifest.json">
<title>SEVEN - Settings</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/mobile.css">
<link rel="stylesheet" href="css/dark.css">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
</head>
<body>
<div class="topbar">
  <button class="topbar-btn" onclick="goTo('home.html')">←</button>
  <div class="topbar-center"><div class="topbar-title">Settings</div></div>
  <div style="width:38px"></div>
</div>
<div style="flex:1;overflow-y:auto;padding:8px 0">
  <div class="settings-group"><div class="settings-group-title">Preferences</div>
    <div class="settings-row" onclick="toggleTheme()"><div class="settings-row-left"><div class="settings-row-icon cyan">🌙</div><div><div class="settings-row-label">Dark Mode</div><div class="settings-row-desc">Toggle dark/light theme</div></div></div><div class="toggle active" id="sTheme"><div class="toggle-knob"></div></div></div>
    <div class="settings-row" onclick="toggleNotif()"><div class="settings-row-left"><div class="settings-row-icon blue">🔔</div><div><div class="settings-row-label">Notifications</div><div class="settings-row-desc">Receive push alerts</div></div></div><div class="toggle active" id="sNotif"><div class="toggle-knob"></div></div></div>
    <div class="settings-row" onclick="toggleSound()"><div class="settings-row-left"><div class="settings-row-icon green">🔊</div><div><div class="settings-row-label">Sound</div><div class="settings-row-desc">Message notification sounds</div></div></div><div class="toggle active" id="sSound"><div class="toggle-knob"></div></div></div>
  </div>
  <div class="settings-group"><div class="settings-group-title">Account</div>
    <div class="settings-row" onclick="goTo('profile.html')"><div class="settings-row-left"><div class="settings-row-icon blue">👤</div><div><div class="settings-row-label">Edit Profile</div><div class="settings-row-desc">Change name, photo, bio</div></div></div><span style="color:var(--text3)">→</span></div>
    <div class="settings-row" onclick="changePwd()"><div class="settings-row-left"><div class="settings-row-icon cyan">🔑</div><div><div class="settings-row-label">Change Password</div><div class="settings-row-desc">Update your password</div></div></div><span style="color:var(--text3)">→</span></div>
    <div class="settings-row" onclick="clearCache()"><div class="settings-row-left"><div class="settings-row-icon green">🧹</div><div><div class="settings-row-label">Clear Cache</div><div class="settings-row-desc">Free up storage space</div></div></div></div>
  </div>
  <div class="settings-group"><div class="settings-row" onclick="confirmLogout()" style="margin-top:8px"><div class="settings-row-left"><div class="settings-row-icon red">🚪</div><div><div class="settings-row-label" style="color:var(--danger)">Logout</div><div class="settings-row-desc">Sign out of SEVEN</div></div></div></div></div>
</div>
<div class="modal-overlay" id="pwdModal">
  <div class="modal"><div class="modal-title">Change Password</div>
    <div class="input-group"><label class="input-label">Current</label><input type="password" class="input-field" id="curPwd" placeholder="Current password"></div>
    <div class="input-group"><label class="input-label">New</label><input type="password" class="input-field" id="newPwd" placeholder="New password"></div>
    <div class="input-group"><label class="input-label">Confirm</label><input type="password" class="input-field" id="conPwd" placeholder="Confirm password"></div>
    <button class="btn btn-primary btn-full" onclick="savePwd()">Save</button>
    <button class="btn btn-ghost btn-full" onclick="closeModal('pwdModal')" style="margin-top:8px">Cancel</button>
  </div>
</div>
<script src="js/firebase.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script>
document.addEventListener('DOMContentLoaded',()=>{
  if(!isLoggedIn()){goTo('login.html');return}
  const t=localStorage.getItem('theme'),n=localStorage.getItem('notif'),s=localStorage.getItem('sound');
  document.getElementById('sTheme').classList.toggle('active',t!=='light');
  document.getElementById('sNotif').classList.toggle('active',n!=='off');
  document.getElementById('sSound').classList.toggle('active',s!=='off');
  if(t==='light')document.body.classList.add('light');
});
function toggleTheme(){const t=document.getElementById('sTheme');t.classList.toggle('active');document.body.classList.toggle('light');localStorage.setItem('theme',t.classList.contains('active')?'dark':'light')}
function toggleNotif(){const t=document.getElementById('sNotif');t.classList.toggle('active');localStorage.setItem('notif',t.classList.contains('active')?'on':'off');if(t.classList.contains('active'))initNotifications()}
function toggleSound(){const t=document.getElementById('sSound');t.classList.toggle('active');localStorage.setItem('sound',t.classList.contains('active')?'on':'off')}
function clearCache(){if('caches'in window){caches.keys().then(keys=>Promise.all(keys.map(k=>caches.delete(k)))).then(()=>toast('Cache cleared','success'))}else toast('Not supported','error')}
function changePwd(){document.getElementById('pwdModal').classList.add('active')}
function closeModal(id){document.getElementById(id).classList.remove('active')}
async function savePwd(){
  const c=document.getElementById('curPwd').value,n=document.getElementById('newPwd').value,co=document.getElementById('conPwd').value;
  if(!c||!n||!co){toast('Fill all fields','error');return}
  if(n.length<6){toast('6+ characters','error');return}
  if(n!==co){toast('Passwords do not match','error');return}
  const uid=localStorage.getItem('uid');const snap=await REFS.users.child(uid).once('value');const u=snap.val();
  if(!u){toast('User not found','error');return}
  const h=await sha256(c);if(h!==u.passwordHash){toast('Wrong password','error');return}
  const nh=await sha256(n);await REFS.users.child(uid).update({passwordHash:nh});toast('Password changed','success');
  closeModal('pwdModal');document.getElementById('curPwd').value='';document.getElementById('newPwd').value='';document.getElementById('conPwd').value='';
}
function confirmLogout(){if(confirm('Logout from SEVEN?')){const u=localStorage.getItem('uid');if(u)REFS.users.child(u).update({onlineStatus:false,lastSeen:Date.now()});clearSession();goTo('login.html')}}
</script>
</body>
</html>
